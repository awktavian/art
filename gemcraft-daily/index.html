<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gemcraft Daily</title>
  <meta name="description" content="A daily puzzle tower defense inspired by GemCraft">
  <meta name="theme-color" content="#0a0a14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/game.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
</head>
<body>
  <div id="app">
    <div id="screen-menu" class="screen active">
      <div class="menu-bg"></div>
      <div class="menu-content">
        <h1 class="title">Gemcraft<span class="title-daily">Daily</span></h1>
        <div id="menu-puzzle-num" class="puzzle-num"></div>
        <div id="menu-streak" class="streak-display"></div>
        <button id="btn-play" class="btn btn-primary">Play Today's Puzzle</button>
        <button id="btn-stats" class="btn btn-secondary">Stats</button>
        <button id="btn-howto" class="btn btn-secondary">How to Play</button>
        <div id="menu-yesterday" class="yesterday-score"></div>
      </div>
    </div>

    <div id="screen-game" class="screen">
      <div id="hud">
        <div class="hud-left">
          <span id="hud-wave" class="hud-item">Wave <b>0</b>/10</span>
          <span id="hud-enemies" class="hud-item enemy-count"></span>
        </div>
        <div class="hud-center">
          <span id="hud-mana" class="hud-item mana">
            <svg class="mana-icon" viewBox="0 0 16 16"><path d="M8 1L2 8l6 7 6-7z" fill="#4488ff"/></svg>
            <b id="mana-value">0</b>
          </span>
        </div>
        <div class="hud-right">
          <button id="btn-speed" class="hud-btn" title="Speed">1x</button>
          <button id="btn-pause" class="hud-btn" title="Pause">⏸</button>
        </div>
      </div>

      <canvas id="game-canvas"></canvas>

      <div id="forge-panel">
        <div id="forge-info" class="forge-info"></div>
        <div id="forge-row">
          <div id="gem-tray"></div>
          <button id="btn-wave" class="btn btn-accent">Send Wave 1</button>
        </div>
      </div>

      <div id="tower-panel" class="panel hidden">
        <div id="tower-info"></div>
        <div id="tower-actions">
          <button id="btn-upgrade" class="btn btn-small">Combine ↑</button>
          <button id="btn-remove" class="btn btn-small btn-danger">Remove</button>
        </div>
      </div>
    </div>

    <div id="screen-results" class="screen">
      <div class="results-content">
        <h2 id="results-title"></h2>
        <div id="results-body"></div>
        <button id="btn-share" class="btn btn-primary">Share Score</button>
        <button id="btn-menu" class="btn btn-secondary">Menu</button>
        <div id="llm-analysis" class="llm-section hidden">
          <h3>Strategy Analysis</h3>
          <div id="llm-content"></div>
        </div>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal" class="modal">
        <button id="modal-close" class="modal-close">&times;</button>
        <div id="modal-content"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
