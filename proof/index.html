<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZFC Proof Galaxy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #07060b;
  color: #e8e6f0;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

.glass {
  background: rgba(12, 11, 18, 0.92);
  backdrop-filter: blur(60px);
  -webkit-backdrop-filter: blur(60px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
}

#hud {
  position: fixed;
  top: 20px; left: 20px;
  padding: 16px 20px;
  z-index: 10;
  font-size: 13px;
  line-height: 1.7;
  opacity: 0.7;
  transition: opacity 233ms;
  max-width: 320px;
}
#hud:hover { opacity: 1; }
#hud h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  color: #fff;
}
#hud .stat { color: rgba(255,255,255,0.5); }
#hud .stat b { color: rgba(255,255,255,0.85); font-weight: 600; }

#search-box {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 10;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#search-input {
  background: transparent;
  border: none;
  outline: none;
  color: #e8e6f0;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  width: 240px;
}
#search-input::placeholder { color: rgba(255,255,255,0.25); }
#search-count { font-size: 12px; color: rgba(255,255,255,0.35); }

#legend {
  position: fixed;
  top: 80px; right: 20px;
  z-index: 10;
  padding: 14px 18px;
  font-size: 12px;
  max-height: calc(100vh - 160px);
  overflow-y: auto;
  width: 200px;
}
#legend h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 10px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 144ms;
}
.legend-item:hover { opacity: 1; }
.legend-item.active { opacity: 1; }
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-label { flex: 1; }
.legend-count { color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }

#detail {
  position: fixed;
  bottom: 20px; left: 20px;
  z-index: 10;
  padding: 0;
  width: 520px;
  max-height: 55vh;
  overflow-y: auto;
  display: none;
  transition: opacity 233ms;
}
#detail.visible { display: block; }
#detail-inner { padding: 20px 24px; }
#detail-name {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
}
#detail-kind {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 14px;
}
#detail-explanation {
  font-size: 13px;
  line-height: 1.8;
  color: rgba(255,255,255,0.75);
  margin-bottom: 14px;
}
#detail-statement {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-left: 3px solid;
  border-radius: 0 6px 6px 0;
  margin-bottom: 14px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 120px;
  overflow-y: auto;
}
#detail-insight {
  font-size: 13px;
  font-style: italic;
  color: rgba(255,255,255,0.5);
  margin-bottom: 14px;
  padding-left: 12px;
  border-left: 2px solid rgba(255,255,255,0.1);
}
#detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.55);
}
.tag.sorry { background: rgba(255,60,60,0.15); color: #ff6b6b; }

#detail-chain { margin-bottom: 14px; }
#detail-chain h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 8px;
}
.chain-item {
  font-size: 12px;
  padding: 4px 0;
  padding-left: 12px;
  border-left: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.55);
}
.chain-item b { color: rgba(255,255,255,0.8); }

#detail-tactics { margin-bottom: 10px; }
#detail-tactics h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 6px;
}
.tactic-bar-container {
  display: flex;
  gap: 3px;
  align-items: flex-end;
  height: 24px;
}
.tactic-bar {
  flex: 1;
  background: rgba(78,205,196,0.4);
  border-radius: 2px 2px 0 0;
  min-width: 3px;
  max-width: 20px;
  position: relative;
}
.tactic-bar:hover::after {
  content: attr(data-label);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  white-space: nowrap;
  color: rgba(255,255,255,0.6);
  padding: 2px 4px;
  background: rgba(0,0,0,0.8);
  border-radius: 3px;
}

#detail-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  line-height: 1.8;
}
#detail-meta b { color: rgba(255,255,255,0.5); }

#loading {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: #07060b;
  transition: opacity 377ms;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading-text {
  font-size: 16px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  text-transform: uppercase;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<div id="loading"><div id="loading-text">Loading proof universe...</div></div>

<canvas id="galaxy"></canvas>

<div id="hud" class="glass"></div>

<div id="search-box" class="glass">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input id="search-input" type="text" placeholder="Search theorems... ( / )">
  <span id="search-count"></span>
</div>

<div id="legend" class="glass"></div>

<div id="detail" class="glass">
  <div id="detail-inner">
    <div id="detail-name"></div>
    <div id="detail-kind"></div>
    <div id="detail-explanation"></div>
    <div id="detail-statement"></div>
    <div id="detail-insight"></div>
    <div id="detail-tags"></div>
    <div id="detail-chain"></div>
    <div id="detail-tactics"></div>
    <div id="detail-meta"></div>
  </div>
</div>

<script>
const DOMAIN_COLORS = {
  categorical_logic: '#4ecdc4',
  set_theory: '#ff6b35',
  computability: '#67d4e4',
  incompleteness: '#e45858',
  self_reference: '#9b7ebd',
  modal_logic: '#f59e0b',
  undefinability: '#d4af37',
  compression: '#7eb77f',
  meta_theory: '#ff8fa3',
  physics: '#64b5f6',
  barriers: '#ef9a9a',
  unification: '#4ecdc4',
  bridges: '#81c784',
  paradoxes: '#ffb74d',
  unclassified: '#666',
};

let DATA = null;
let nodes = [];
let selected = null;
let searchFilter = '';
let domainFilter = null;
let rotX = 0.3, rotY = 0.5;
let targetRotX = 0.3, targetRotY = 0.5;
let zoom = 1.0, targetZoom = 1.0;
let isDragging = false;
let lastMouse = { x: 0, y: 0 };
let autoRotate = true;
let hoveredNode = null;
let W, H;
const canvas = document.getElementById('galaxy');
const ctx = canvas.getContext('2d');

fetch('codebase-analysis.json')
  .then(r => r.json())
  .then(data => {
    DATA = data;
    init();
    document.getElementById('loading').classList.add('hidden');
    requestAnimationFrame(render);
  })
  .catch(e => {
    document.getElementById('loading-text').textContent = 'Error: ' + e.message;
  });

function init() {
  resize();
  window.addEventListener('resize', resize);

  nodes = DATA.theorems.map((t, i) => ({
    ...t,
    idx: i,
    wx: (t.x - 0.5) * 3.0,
    wy: (t.y - 0.5) * 3.0,
    wz: (t.z - 0.5) * 3.0,
    radius: 3 + Math.sqrt(t.pagerank * 40 + t.consumers * 2),
    color: DOMAIN_COLORS[t.domain] || '#666',
    alpha: 1.0,
    targetAlpha: 1.0,
    screenX: 0, screenY: 0, screenZ: 0, screenR: 0,
  }));

  buildHUD();
  buildLegend();
  setupInput();
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

function buildHUD() {
  const s = DATA.stats;
  document.getElementById('hud').innerHTML = `
    <h1>ZFC Proof Galaxy</h1>
    <div class="stat"><b>${s.total_declarations}</b> declarations</div>
    <div class="stat"><b>${s.theorems}</b> theorems &middot; <b>${s.definitions}</b> definitions</div>
    <div class="stat"><b>${s.edge_count}</b> dependencies &middot; depth <b>${s.max_depth}</b></div>
    <div class="stat"><b>${s.sorry_count}</b> sorry &middot; <b>${s.domain_count}</b> domains</div>
    <div class="stat" style="margin-top:6px;font-size:11px;color:rgba(255,255,255,0.25)">
      ${DATA.soundness.status === 'CLEAN' ? 'KERNEL SOUND' : DATA.soundness.sorry_count + ' sorry remaining'}
    </div>
  `;
}

function buildLegend() {
  const el = document.getElementById('legend');
  let html = '<h3>Domains</h3>';
  const counts = {};
  DATA.theorems.forEach(t => { counts[t.domain] = (counts[t.domain] || 0) + 1; });
  Object.entries(counts).sort((a,b) => b[1] - a[1]).forEach(([domain, count]) => {
    const color = DOMAIN_COLORS[domain] || '#666';
    html += `<div class="legend-item" data-domain="${domain}">
      <div class="legend-dot" style="background:${color}"></div>
      <span class="legend-label">${domain.replace(/_/g, ' ')}</span>
      <span class="legend-count">${count}</span>
    </div>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.legend-item').forEach(item => {
    item.addEventListener('click', () => {
      const d = item.dataset.domain;
      if (domainFilter === d) {
        domainFilter = null;
        el.querySelectorAll('.legend-item').forEach(i => i.classList.remove('active'));
      } else {
        domainFilter = d;
        el.querySelectorAll('.legend-item').forEach(i => i.classList.toggle('active', i.dataset.domain === d));
      }
      updateFilters();
    });
  });
}

function setupInput() {
  const si = document.getElementById('search-input');
  si.addEventListener('input', () => { searchFilter = si.value.toLowerCase().trim(); updateFilters(); });
  document.addEventListener('keydown', e => {
    if (e.key === '/') { e.preventDefault(); si.focus(); }
    if (e.key === 'Escape') {
      selected = null;
      document.getElementById('detail').classList.remove('visible');
      si.blur(); searchFilter = ''; si.value = '';
      domainFilter = null;
      document.querySelectorAll('.legend-item').forEach(i => i.classList.remove('active'));
      updateFilters();
    }
  });
  canvas.addEventListener('mousedown', e => { isDragging = true; autoRotate = false; lastMouse = {x:e.clientX, y:e.clientY}; });
  canvas.addEventListener('mousemove', e => {
    if (isDragging) {
      targetRotY += (e.clientX - lastMouse.x) * 0.005;
      targetRotX += (e.clientY - lastMouse.y) * 0.005;
      targetRotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetRotX));
      lastMouse = {x:e.clientX, y:e.clientY};
    } else {
      hoveredNode = null;
      let minD = 20;
      for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        if (n.alpha < 0.1) continue;
        const dx = e.clientX - n.screenX, dy = e.clientY - n.screenY;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < n.screenR + 4 && d < minD) { minD = d; hoveredNode = n; }
      }
      canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
    }
  });
  canvas.addEventListener('mouseup', () => { isDragging = false; });
  canvas.addEventListener('click', () => { if (hoveredNode) selectNode(hoveredNode); });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    targetZoom *= (1 - e.deltaY * 0.001);
    targetZoom = Math.max(0.3, Math.min(4.0, targetZoom));
  }, { passive: false });

  let td = 0;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { isDragging = true; autoRotate = false; lastMouse = {x:e.touches[0].clientX, y:e.touches[0].clientY}; }
    else if (e.touches.length === 2) { const dx = e.touches[0].clientX-e.touches[1].clientX, dy = e.touches[0].clientY-e.touches[1].clientY; td = Math.sqrt(dx*dx+dy*dy); }
  });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      targetRotY += (e.touches[0].clientX - lastMouse.x) * 0.005;
      targetRotX += (e.touches[0].clientY - lastMouse.y) * 0.005;
      targetRotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetRotX));
      lastMouse = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX-e.touches[1].clientX, dy = e.touches[0].clientY-e.touches[1].clientY;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (td > 0) { targetZoom *= d/td; targetZoom = Math.max(0.3, Math.min(4, targetZoom)); }
      td = d;
    }
  }, { passive: false });
  canvas.addEventListener('touchend', () => { isDragging = false; });
}

function updateFilters() {
  let mc = 0;
  nodes.forEach(n => {
    let show = true;
    if (searchFilter) { show = `${n.name} ${n.domain} ${n.technique} ${n.explanation||''}`.toLowerCase().includes(searchFilter); }
    if (domainFilter) { show = show && n.domain === domainFilter; }
    n.targetAlpha = show ? 1.0 : 0.03;
    if (show) mc++;
  });
  document.getElementById('search-count').textContent = (searchFilter || domainFilter) ? `${mc}/${nodes.length}` : '';
}

function selectNode(node) {
  selected = node;
  const t = DATA.theorems[node.idx];
  const c = node.color;
  document.getElementById('detail').classList.add('visible');
  document.getElementById('detail-name').textContent = t.name;
  document.getElementById('detail-name').style.color = c;
  document.getElementById('detail-kind').textContent = `${t.kind} \u00B7 ${t.domain.replace(/_/g,' ')} \u00B7 ${t.technique}`;
  document.getElementById('detail-explanation').textContent = t.explanation || '';
  document.getElementById('detail-statement').textContent = t.statement || '';
  document.getElementById('detail-statement').style.borderColor = c;
  document.getElementById('detail-insight').textContent = t.key_insight || '';

  let tags = `<span class="tag">${t.domain.replace(/_/g,' ')}</span>`;
  tags += `<span class="tag">${t.technique}</span><span class="tag">${t.kind}</span><span class="tag">${t.complexity}</span>`;
  if (t.sorry) tags += `<span class="tag sorry">sorry</span>`;
  tags += `<span class="tag">${t.consumers} consumers</span><span class="tag">depth ${t.depth}</span>`;
  if (t.novelty === 'novel') tags += `<span class="tag" style="background:rgba(78,205,196,0.15);color:#4ecdc4">novel</span>`;
  document.getElementById('detail-tags').innerHTML = tags;

  let ch = '';
  if (t.chain && t.chain.length) {
    ch = '<h4>Dependency Chain</h4>';
    t.chain.slice(0,8).forEach(x => { ch += `<div class="chain-item"><b>${x.name}</b> ${x.role}</div>`; });
  }
  document.getElementById('detail-chain').innerHTML = ch;

  let tc = '';
  const tp = t.tactic_profile || {};
  const ents = Object.entries(tp).sort((a,b) => b[1]-a[1]).slice(0,12);
  if (ents.length) {
    tc = '<h4>Tactic Profile</h4><div class="tactic-bar-container">';
    const mx = Math.max(...ents.map(e=>e[1]));
    ents.forEach(([nm,ct]) => { tc += `<div class="tactic-bar" style="height:${Math.max(3,ct/mx*24)}px" data-label="${nm}(${ct})"></div>`; });
    tc += '</div>';
  }
  document.getElementById('detail-tactics').innerHTML = tc;
  document.getElementById('detail-meta').innerHTML = `<b>PageRank:</b> ${t.pagerank.toFixed(3)} &middot; <b>Lines:</b> ${t.proof_lines} &middot; <b>Statement:</b> ${t.statement_type}<br><b>File:</b> ${t.file}:${t.line}`;
}

function project(wx, wy, wz) {
  const cy = Math.cos(rotY), sy = Math.sin(rotY);
  let x1 = wx*cy - wz*sy, z1 = wx*sy + wz*cy, y1 = wy;
  const cx = Math.cos(rotX), sx = Math.sin(rotX);
  let y2 = y1*cx - z1*sx, z2 = y1*sx + z1*cx, x2 = x1;
  const fov = 4.0, d = fov + z2*zoom;
  const s = (fov / Math.max(d, 0.1)) * Math.min(W,H) * 0.35 * zoom;
  return { x: W/2 + x2*s, y: H/2 - y2*s, z: z2, scale: s/(Math.min(W,H)*0.35) };
}

function render() {
  requestAnimationFrame(render);
  rotX += (targetRotX - rotX) * 0.08;
  rotY += (targetRotY - rotY) * 0.08;
  zoom += (targetZoom - zoom) * 0.08;
  if (autoRotate) targetRotY += 0.0008;
  nodes.forEach(n => { n.alpha += (n.targetAlpha - n.alpha) * 0.12; });

  ctx.clearRect(0, 0, W, H);

  // Nebula
  const colors = ['#ff6b35','#4ecdc4','#67d4e4','#9b7ebd','#f59e0b','#7eb77f','#d4af37'];
  const tm = Date.now() * 0.00003;
  colors.forEach((c,i) => {
    const x = W*(0.3+0.4*Math.sin(tm+i*1.3)), y = H*(0.3+0.4*Math.cos(tm*0.7+i*0.9));
    const g = ctx.createRadialGradient(x,y,0,x,y,Math.min(W,H)*0.4);
    g.addColorStop(0, rgba(c,0.025));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  });

  nodes.forEach(n => { const p = project(n.wx,n.wy,n.wz); n.screenX=p.x; n.screenY=p.y; n.screenZ=p.z; n.screenR=Math.max(1.5,n.radius*p.scale); });
  const sorted = [...nodes].sort((a,b) => a.screenZ - b.screenZ);

  // Edges for selected
  if (selected) {
    const t = DATA.theorems[selected.idx];
    const imp = new Set(t.imports||[]), exp = new Set(t.exports||[]);
    nodes.forEach(n => { if (imp.has(n.name)) drawEdge(selected,n,'rgba(78,205,196,0.35)',false); });
    nodes.forEach(n => { if (exp.has(n.name)) drawEdge(n,selected,'rgba(245,158,11,0.25)',true); });
  }

  sorted.forEach(n => {
    if (n.alpha < 0.01) return;
    const a = n.alpha, r = n.screenR;
    const hov = hoveredNode === n, sel = selected === n;

    if (n.sorry) {
      const er = Math.sin(Date.now()*0.003)*2+2;
      ctx.beginPath(); ctx.arc(n.screenX,n.screenY,r+er+4,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,60,60,${0.08*a})`; ctx.fill();
    }
    if (hov || sel) {
      ctx.beginPath(); ctx.arc(n.screenX,n.screenY,r+8,0,Math.PI*2);
      const g = ctx.createRadialGradient(n.screenX,n.screenY,r,n.screenX,n.screenY,r+8);
      g.addColorStop(0,rgba(n.color,0.3*a)); g.addColorStop(1,'transparent');
      ctx.fillStyle = g; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(n.screenX,n.screenY,r,0,Math.PI*2);
    ctx.fillStyle = rgba(n.color,(hov||sel?0.95:0.7)*a); ctx.fill();

    if ((r>5||hov||sel) && a>0.3) {
      ctx.font = `${sel?'600':'500'} ${Math.max(9,Math.min(13,r*1.2))}px Inter`;
      ctx.fillStyle = rgba('#ffffff',(hov||sel?0.9:0.5)*a);
      ctx.textAlign = 'center';
      ctx.fillText(n.name, n.screenX, n.screenY-r-5);
    }
  });
}

function drawEdge(from,to,color,dashed) {
  ctx.beginPath();
  if (dashed) ctx.setLineDash([4,4]); else ctx.setLineDash([]);
  ctx.moveTo(from.screenX,from.screenY); ctx.lineTo(to.screenX,to.screenY);
  ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.stroke(); ctx.setLineDash([]);
}

function rgba(hex, alpha) {
  if (hex.startsWith('rgba')) return hex;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
