[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kagami-observability"
version = "0.1.0"
description = "Observability stack for Kagami - Prometheus metrics, distributed tracing, structured logging, and performance monitoring"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Tim Christensen", email = "tim@awkronos.com"},
]
keywords = ["observability", "metrics", "prometheus", "tracing", "logging", "monitoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Monitoring",
    "Topic :: System :: Logging",
]

dependencies = [
    "prometheus-client>=0.17.0",
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "structlog>=23.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

jaeger = [
    "opentelemetry-exporter-jaeger>=1.20.0",
]

otlp = [
    "opentelemetry-exporter-otlp>=1.20.0",
]

all = [
    "kagami-observability[jaeger,otlp]",
]

[project.urls]
Homepage = "https://github.com/awkronos/kagami-observability"
Repository = "https://github.com/awkronos/kagami-observability"
Documentation = "https://github.com/awkronos/kagami-observability#readme"

[tool.setuptools.packages.find]
where = ["."]
include = ["kagami_observability*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "RUF"]
ignore = ["E501", "A003"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
