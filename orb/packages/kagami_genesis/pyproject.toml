[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kagami-genesis"
version = "0.1.0"
description = "3D physics simulation and rendering module extracted from Kagami - real-time physics, cinematography, and video generation"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    {name = "Tim Christensen", email = "tim@awkronos.com"},
]
keywords = ["physics", "3d", "rendering", "simulation", "genesis", "cinematography"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Graphics :: 3D Rendering",
    "Topic :: Scientific/Engineering :: Physics",
]

dependencies = [
    "genesis-world>=0.3.3",
    "numpy>=2.1,<3.0",
    "torch>=2.6.0,<3.0",
    "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[project.urls]
Homepage = "https://github.com/awkronos/kagami-genesis"
Repository = "https://github.com/awkronos/kagami-genesis"
Documentation = "https://github.com/awkronos/kagami-genesis#readme"

[tool.setuptools.packages.find]
where = ["."]
include = ["kagami_genesis*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "ANN", "B", "A", "COM", "C4", "ISC", "PIE", "T20", "RET", "SIM", "ARG", "PTH", "ERA", "PL", "RUF"]
ignore = ["PLR0913", "PLR2004"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
