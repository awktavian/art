# UniFFI configuration for Kagami Mesh SDK
#
# This configuration file controls how UniFFI generates bindings for
# iOS, Android, and other platforms.

[bindings]

# Swift bindings for iOS/macOS/watchOS/visionOS
[bindings.swift]
# Module name for the generated Swift code
module_name = "KagamiMeshSDK"

# Generate async functions where applicable
generate_module_map = true

# Custom type mappings for Swift
[bindings.swift.custom_types]
# Map Rust Vec<u8> to Swift Data
[bindings.swift.custom_types.bytes]
type_name = "Data"

# Kotlin bindings for Android
[bindings.kotlin]
# Package name for the generated Kotlin code
package_name = "com.kagami.mesh.sdk"

# Enable coroutines for async functions
android_cleaner = true

# Generate JNI loading code
generate_immutable_records = true

# Python bindings (for testing and scripting)
[bindings.python]
# This is optional but useful for testing
cdylib_name = "kagami_mesh_sdk"

# Ruby bindings (optional, for server-side usage)
[bindings.ruby]
cdylib_name = "kagami_mesh_sdk"
