[package]
name = "kagami-mesh-sdk"
version = "0.1.0"
edition = "2021"
description = "Kagami mesh networking SDK with UniFFI bindings for iOS, Android, and Desktop"
license = "MIT"
repository = "https://github.com/awkronos/kagami"

[lib]
crate-type = ["cdylib", "staticlib", "lib"]
name = "kagami_mesh_sdk"

[dependencies]
# Cryptography
ed25519-dalek = { version = "2.1", features = ["rand_core", "serde", "zeroize"] }
x25519-dalek = { version = "2.0", features = ["static_secrets", "serde", "zeroize"] }
zeroize = { version = "1.8", features = ["derive"] }
chacha20poly1305 = "0.10"
hkdf = "0.12"
sha2 = "0.10"
rand = "0.8"
rand_core = "0.6"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1.35", features = ["rt-multi-thread", "sync", "time", "macros"] }

# WebSocket with TLS backend selection
tokio-tungstenite = { version = "0.21", default-features = false, features = ["connect"] }
futures-util = "0.3"

# Error handling
thiserror = "1.0"

# UniFFI
uniffi = "0.28"

# Logging
tracing = "0.1"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Utilities
base64 = "0.22"
hex = "0.4"
parking_lot = "0.12"
uuid = { version = "1.7", features = ["v4"] }

[build-dependencies]
uniffi = { version = "0.28", features = ["build"] }

[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi_bindgen.rs"
required-features = ["bindgen"]

[dev-dependencies]
tokio-test = "0.4"

[features]
default = ["native-tls"]
uniffi = []
bindgen = ["dep:uniffi_bindgen", "dep:camino", "dep:toml", "dep:anyhow"]
# TLS backend selection
native-tls = ["tokio-tungstenite/native-tls"]
rustls-tls = ["tokio-tungstenite/rustls-tls-webpki-roots"]

[dependencies.uniffi_bindgen]
version = "0.28"
optional = true

[dependencies.camino]
version = "1.1"
optional = true

[dependencies.toml]
version = "0.5"
optional = true

[dependencies.anyhow]
version = "1.0"
optional = true
