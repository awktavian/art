[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kagami-tunnel"
version = "1.0.0"
description = "Kagami Secure Tunnel - Encrypted mesh networking over the internet"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Kagami Development Team", email = "dev@kagami-framework.org"}
]
keywords = [
    "tunnel",
    "mesh",
    "networking",
    "noise-protocol",
    "encryption",
    "nat-traversal",
    "stun",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet",
    "Topic :: Security :: Cryptography",
    "Topic :: System :: Networking",
]

dependencies = [
    "cryptography>=41.0.0",
    "aiohttp>=3.9.0,<4.0",
]

[project.optional-dependencies]
# mDNS discovery
mdns = [
    "zeroconf>=0.131.0",
]

# Development dependencies
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1",
    "mypy>=1.0",
]

# All optional features
full = [
    "kagami-tunnel[mdns]",
]

[project.urls]
Homepage = "https://kagami.ai"
Documentation = "https://kagami.ai/docs/tunnel"
Repository = "https://github.com/awkronos/kagami-tunnel"

[tool.setuptools.packages.find]
where = ["."]
include = ["kagami_tunnel*"]

[tool.black]
line-length = 100
target-version = ['py311', 'py312']

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "A", "S", "N", "RUF"]
ignore = [
    "E402",  # Module imports not at top
    "E501",  # Line too long
    "S101",  # Use of assert
    "S311",  # Standard pseudo-random generators
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
