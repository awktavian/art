[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kagami-smarthome"
version = "2.0.0"
description = "Smart Home Integration for Kagami: UniFi, Control4, Denon with Theory of Mind presence inference"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Tim Jacoby", email = "timothyjacoby@gmail.com"}
]
keywords = ["smart-home", "home-automation", "unifi", "control4", "denon", "presence", "iot"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Home Automation",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# Core dependencies
# Note: kagami core is not listed as a dependency because satellite packages
# are installed alongside the core package in editable mode. The core package
# provides these satellite packages via [project.dependencies] which creates
# the circular dependency.
dependencies = [
    "aiohttp>=3.9.0,<4.0",
]

[project.optional-dependencies]
# Full installation with all integrations
full = [
    "pyatv>=0.16.0",      # AirPlay streaming
    "pyicloud>=2.2.0",    # Apple FindMy integration
    "numpy>=2.1,<3.0",    # Audio processing
    "sounddevice>=0.4.6", # Low-latency audio output
]

# AirPlay/Audio streaming
audio = [
    "pyatv>=0.16.0",
    "numpy>=2.1,<3.0",
    "sounddevice>=0.4.6",
]

# Spotify streaming (auto-installs librespot-python)
spotify = [
    "numpy>=2.1,<3.0",
    "sounddevice>=0.4.6",
]

# Apple services
apple = [
    "pyicloud>=2.2.0",
]

# Development
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "mypy>=1.7.0",
    "ruff>=0.1.6",
]

[project.urls]
Homepage = "https://github.com/awkronos/kagami"
Documentation = "https://docs.kagami-framework.org/smarthome"
Repository = "https://github.com/awkronos/kagami"

[tool.setuptools]
# Flat layout: package files are directly in this directory
packages = ["kagami_smarthome"]
package-dir = {"kagami_smarthome" = "."}

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
