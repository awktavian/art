[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kagami-math"
version = "0.1.0"
description = "Geometric algebra primitives for exceptional Lie hierarchy (G₂ ⊂ F₄ ⊂ E₆ ⊂ E₇ ⊂ E₈) - octonions, quaternions, E8 lattice quantization"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Tim Christensen", email = "tim@awkronos.com"},
]
keywords = ["math", "octonions", "quaternions", "e8", "g2", "lie-algebra", "geometric-algebra"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "torch>=2.6.0,<3.0",
    "numpy>=2.1,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[project.urls]
Homepage = "https://github.com/awkronos/kagami-math"
Repository = "https://github.com/awkronos/kagami-math"
Documentation = "https://github.com/awkronos/kagami-math#readme"

[tool.setuptools.packages.find]
where = ["."]
include = ["kagami_math*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "RUF"]
ignore = ["E501", "N802", "N806", "A003"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
