# Kagami Smart Home Discovery (EXAMPLE / TEMPLATE)
# NOTE: Do NOT commit real addresses, SSIDs, or device inventories.
#
# Create your local/private copy at:
#   config/smart_home_discovery.yaml   (gitignored)
#
# Generated: YYYY-MM-DD
#
# =============================================================================
# NETWORK INFRASTRUCTURE
# =============================================================================
network:
  gateway: "192.168.1.1"
  subnet: "192.168.1.0/24"
  dhcp_leases: 0
  dns: "192.168.1.1"
  wifi_ssid: "<YOUR_SSID>"
  notes: "<optional>"
 
# =============================================================================
# UNIFI SYSTEM
# =============================================================================
unifi:
  console:
    name: "<UDM_NAME>"
    model: "<UDM_MODEL>"
    ip: "192.168.1.1"
    os_version: "<VERSION>"
    timezone: "<TZ>"
 
  applications:
    network:
      version: "<VERSION>"
      enabled: true
    protect:
      version: "<VERSION>"
      enabled: true
 
  access_points:
    - model: "<AP_MODEL>"
      ip: "192.168.1.10"
      wifi_generation: "<WiFi 6/7>"
      clients: 0
 
  cameras:
    - model: "<CAMERA_MODEL>"
      ip: "192.168.1.20"
      features: ["person_detection"]
      last_event: "<e.g. 5 minutes ago>"
 
# =============================================================================
# CONTROL4 SYSTEM
# =============================================================================
control4:
  controller:
    name: "<DIRECTOR_NAME>"
    vendor: "Control4"
    ip: "<DIRECTOR_IP>"
 
  integration:
    method: "pyControl4"
    requirements:
      - "Director IP address"
      - "Bearer token from Control4 app"
      - "OS version 3.0+"
 
# =============================================================================
# AUDIO/VIDEO
# =============================================================================
audio_video:
  denon:
    name: "<DENON_NAME>"
    vendor: "DENON"
    model: "<AVR_MODEL>"
    ip: "<DENON_IP>"
    ports:
      - web_interface: 80
      - telnet_control: 23
      - heos_api: 1255
 
# =============================================================================
# LIGHTING
# =============================================================================
lighting:
  lutron:
    name: "<LUTRON_BRIDGE_NAME>"
    vendor: "Lutron"
    ip: "<LUTRON_IP>"
 
  philips_hue:
    name: "<HUE_BRIDGE_ID>"
    vendor: "Philips Hue"
    ip: "<HUE_IP>"
    api_port: 443
 
# =============================================================================
# SECURITY
# =============================================================================
security:
  dsc:
    type: "DSC Security System"
    integration: "Via Control4"
    module: "IT-100"
 
# =============================================================================
# CONFIGURATION NEEDED FROM USER
# =============================================================================
pending_configuration:
  unifi:
    - item: "Local username"
      purpose: "API authentication for real-time events"
    - item: "Local password"
      purpose: "API authentication"
 
  control4:
    - item: "Director IP address"
      purpose: "API endpoint"
    - item: "Bearer token"
      purpose: "API authentication"
