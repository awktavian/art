# K os Docker Compose Configuration
# Optimized for Full Operation Mode with all mandatory components

services:
  redis:
    image: redis:7-alpine
    container_name: kagami-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - kagami-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  cockroachdb:
    image: cockroachdb/cockroach:v23.1.11
    container_name: kagami-cockroachdb
    # SECURITY: Use certs in production. For dev, use --insecure only locally.
    # In production, mount certs from secrets and use:
    # command: start-single-node --certs-dir=/certs --advertise-addr=cockroachdb
    # Reduce ballast to keep disk usage low in dev. Set ballast-size=0 to disable.
    command: >
      start-single-node
      --insecure
      --advertise-addr=cockroachdb
      --store=path=/cockroach/cockroach-data,ballast-size=128MiB
    ports:
      - "26257:26257"
      - "8083:8080"  # Admin UI (moved from 8080 to avoid conflicts)
    volumes:
      - cockroach_data:/cockroach/cockroach-data
      # Uncomment for production with TLS:
      # - ./certs/cockroach:/certs:ro
    environment:
      COCKROACH_DATABASE: kagami
    networks:
      - kagami-network
    healthcheck:
      test: ["CMD", "/cockroach/cockroach", "sql", "--insecure", "--host=cockroachdb", "--execute=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  db-init:
    image: cockroachdb/cockroach:v23.1.11
    container_name: kagami-db-init
    depends_on:
      cockroachdb:
        condition: service_healthy
    command: sql --insecure --host=cockroachdb --execute="CREATE DATABASE IF NOT EXISTS kagami;"
    networks:
      - kagami-network
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kagami-api:latest
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      cockroachdb:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://root@cockroachdb:26257/kagami?sslmode=disable
      - KAGAMI_HOST=0.0.0.0
      - KAGAMI_PORT=50794
      - KAGAMI_USE_DOTENV=0
      # etcd cluster (3-node for quorum)
      - ETCD_ENDPOINTS=http://etcd1:2379,http://etcd2:2379,http://etcd3:2379
      - ETCD_CLUSTER_SIZE=3
      - ETCD_POOL_SIZE=5
      - ETCD_CONNECT_TIMEOUT=5
      # Weaviate (Elysia RAG)
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_API_KEY=${WEAVIATE_API_KEY:-kagami-weaviate-dev-key}
      - WEAVIATE_GRPC_HOST=weaviate
      - WEAVIATE_GRPC_PORT=50051
      # Resource limits
      - KAGAMI_FULL_OPERATION=1
      - KAGAMI_AGENT_PLANNER_SOFT_GB=12
      - KAGAMI_AGENT_PLANNER_HARD_GB=24
      - KAGAMI_AGENT_RESEARCH_SOFT_GB=16
      - KAGAMI_AGENT_RESEARCH_HARD_GB=32
    volumes:
      - ./kagami:/app/kagami:ro
      - ./tests:/app/tests:ro
      - ~/.kagami:/kagami
    networks:
      - kagami-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # etcd cluster (3 nodes for production-grade quorum)
  etcd1:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: kagami-etcd1
    command:
      - /usr/local/bin/etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=kagami-etcd-cluster
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=1h
      - --quota-backend-bytes=8589934592
      - --max-request-bytes=10485760
      - --heartbeat-interval=100
      - --election-timeout=1000
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd1-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - ETCDCTL_API=3
    networks:
      - kagami-network

  etcd2:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: kagami-etcd2
    command:
      - /usr/local/bin/etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd2:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=kagami-etcd-cluster
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=1h
      - --quota-backend-bytes=8589934592
      - --max-request-bytes=10485760
      - --heartbeat-interval=100
      - --election-timeout=1000
    ports:
      - "2389:2379"
      - "2390:2380"
    volumes:
      - etcd2-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - ETCDCTL_API=3
    networks:
      - kagami-network

  etcd3:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: kagami-etcd3
    command:
      - /usr/local/bin/etcd
      - --name=etcd3
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd3:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd3:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=kagami-etcd-cluster
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=1h
      - --quota-backend-bytes=8589934592
      - --max-request-bytes=10485760
      - --heartbeat-interval=100
      - --election-timeout=1000
    ports:
      - "2399:2379"
      - "2400:2380"
    volumes:
      - etcd3-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - ETCDCTL_API=3
    networks:
      - kagami-network

  # Weaviate Vector Database (Required for Elysia RAG integration)
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    container_name: kagami-weaviate
    ports:
      - "8085:8080"  # REST API
      - "50051:50051"  # gRPC
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'false'
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: '${WEAVIATE_API_KEY:-kagami-weaviate-dev-key}'
      AUTHENTICATION_APIKEY_USERS: 'kagami'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'weaviate-node1'
      # Performance tuning
      LIMIT_RESOURCES: 'false'
      GOMAXPROCS: '4'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kagami-network
    restart: unless-stopped

networks:
  kagami-network:
    driver: bridge

volumes:
  redis_data:
  cockroach_data:
  kagami-data:
  etcd1-data:
  etcd2-data:
  etcd3-data:
  weaviate_data:
