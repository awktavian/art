<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Fano plane - app icon -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#grad)"/>

  <!-- Fano plane -->
  <g transform="translate(14, 14) scale(4.2)">
    <path d="M12 3 L3 19.5 L21 19.5 Z" stroke="#e8d5b7" stroke-width="1.5" fill="none"/>
    <line x1="12" y1="3" x2="12" y2="19.5" stroke="#e8d5b7" stroke-width="1"/>
    <line x1="3" y1="19.5" x2="16.5" y2="11" stroke="#e8d5b7" stroke-width="1"/>
    <line x1="21" y1="19.5" x2="7.5" y2="11" stroke="#e8d5b7" stroke-width="1"/>
    <circle cx="12" cy="14" r="5.5" stroke="#e8d5b7" stroke-width="1.5" fill="none"/>

    <!-- 7 Points -->
    <circle cx="12" cy="3" r="1.5" fill="#e8d5b7"/>
    <circle cx="3" cy="19.5" r="1.5" fill="#e8d5b7"/>
    <circle cx="21" cy="19.5" r="1.5" fill="#e8d5b7"/>
    <circle cx="7.5" cy="11" r="1.5" fill="#e8d5b7"/>
    <circle cx="16.5" cy="11" r="1.5" fill="#e8d5b7"/>
    <circle cx="12" cy="19.5" r="1.5" fill="#e8d5b7"/>
    <circle cx="12" cy="14" r="1.5" fill="#e8d5b7"/>
  </g>
</svg>
