<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - Kagami</title>

    <!-- GENUX Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Kagami Design System -->
    <link rel="stylesheet" href="css/prism-tokens.css">
    <link rel="stylesheet" href="css/genux-tokens.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components/inputs/text-field.css">
    <link rel="stylesheet" href="css/components/actions/button.css">
    <link rel="stylesheet" href="css/accessibility.css">

    <!-- Mobile viewport -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#07060B">

    <style>
        /* ═══════════════════════════════════════════════════════════════
         * LOGIN PAGE STYLES
         * Using Kagami Design System V2 tokens
         * ═══════════════════════════════════════════════════════════════ */

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body, var(--prism-font-sans));
            background: var(--void, #07060B);
            color: var(--prism-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ambient background effects */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .login-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(
                ellipse at 30% 40%,
                var(--prism-beacon-08) 0%,
                transparent 40%
            ),
            radial-gradient(
                ellipse at 70% 60%,
                var(--prism-crystal-08) 0%,
                transparent 40%
            );
            animation: login-bg-drift 20s ease-in-out infinite;
        }

        @keyframes login-bg-drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-2%, 2%) rotate(-1deg); }
        }

        /* Login container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: var(--prism-space-6);
        }

        /* Glass card */
        .login-card {
            position: relative;
            padding: var(--prism-space-8);
            background:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
                var(--prism-surface);
            background-blend-mode: overlay, normal;
            backdrop-filter: blur(var(--prism-blur)) saturate(var(--prism-saturation));
            -webkit-backdrop-filter: blur(var(--prism-blur)) saturate(var(--prism-saturation));
            border: 1px solid transparent;
            border-image: linear-gradient(
                145deg,
                rgba(255, 255, 255, 0.25) 0%,
                rgba(255, 255, 255, 0.1) 50%,
                rgba(0, 0, 0, 0.02) 100%
            ) 1;
            border-radius: var(--prism-radius-xl);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.15),
                inset 0 -1px 1px rgba(0, 0, 0, 0.05);
        }

        /* Chromatic glow ring */
        .login-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: var(--prism-gradient-spectrum);
            opacity: 0;
            filter: blur(12px);
            z-index: -1;
            transition: opacity var(--prism-dur-normal) var(--prism-ease-cusp);
            pointer-events: none;
        }

        .login-card:focus-within::before {
            opacity: 0.3;
        }

        /* Brand header */
        .login-header {
            text-align: center;
            margin-bottom: var(--prism-space-8);
        }

        .login-kanji {
            font-size: 3rem;
            font-family: var(--font-jp, 'Noto Sans JP');
            color: var(--prism-beacon);
            text-shadow: 0 0 32px var(--prism-beacon-25);
            margin-bottom: var(--prism-space-2);
            animation: kanji-breathe 4s ease-in-out infinite;
        }

        @keyframes kanji-breathe {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .login-title {
            font-family: var(--font-brand, 'IBM Plex Mono');
            font-size: var(--prism-text-2xl);
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--prism-text);
            margin: 0 0 var(--prism-space-1);
        }

        .login-subtitle {
            font-size: var(--prism-text-sm);
            color: var(--prism-text-secondary);
            margin: 0;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--prism-space-5);
        }

        /* Server discovery section */
        .server-section {
            display: flex;
            flex-direction: column;
            gap: var(--prism-space-2);
        }

        .server-row {
            display: flex;
            gap: var(--prism-space-2);
            align-items: flex-end;
        }

        .server-row .prism-text-field {
            flex: 1;
        }

        /* Discovery button */
        .discover-btn {
            height: 44px;
            padding: 0 var(--prism-space-3);
            background: var(--prism-surface);
            border: 1px solid var(--prism-border);
            border-radius: var(--prism-radius-md);
            color: var(--prism-text-secondary);
            cursor: pointer;
            transition: all var(--prism-dur-fast) var(--prism-ease-cusp);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--prism-space-1);
            white-space: nowrap;
        }

        .discover-btn:hover:not(:disabled) {
            background: var(--prism-surface-elevated);
            color: var(--prism-text);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .discover-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .discover-btn .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--prism-text-tertiary);
            border-top-color: var(--prism-beacon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Server list dropdown */
        .server-list {
            display: none;
            background: var(--prism-surface-elevated);
            border: 1px solid var(--prism-border);
            border-radius: var(--prism-radius-md);
            max-height: 200px;
            overflow-y: auto;
            animation: fadeIn var(--prism-dur-fast) var(--prism-ease-cusp);
        }

        .server-list.visible {
            display: block;
        }

        .server-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--prism-space-3);
            cursor: pointer;
            transition: background var(--prism-dur-fast) var(--prism-ease-cusp);
            border-bottom: 1px solid var(--prism-border-subtle);
        }

        .server-list-item:last-child {
            border-bottom: none;
        }

        .server-list-item:hover {
            background: var(--prism-surface-overlay);
        }

        .server-list-item .server-name {
            font-weight: 500;
            color: var(--prism-text);
        }

        .server-list-item .server-address {
            font-size: var(--prism-text-xs);
            color: var(--prism-text-tertiary);
            font-family: var(--prism-font-mono);
        }

        .server-list-item .server-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--prism-nexus);
            box-shadow: 0 0 8px var(--prism-nexus-25);
        }

        .server-list-empty {
            padding: var(--prism-space-4);
            text-align: center;
            color: var(--prism-text-tertiary);
            font-size: var(--prism-text-sm);
        }

        /* Divider */
        .login-divider {
            display: flex;
            align-items: center;
            gap: var(--prism-space-3);
            color: var(--prism-text-tertiary);
            font-size: var(--prism-text-xs);
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--prism-border-subtle);
        }

        /* Error message */
        .login-error {
            display: none;
            padding: var(--prism-space-3);
            background: var(--prism-spark-08);
            border: 1px solid var(--prism-spark-25);
            border-radius: var(--prism-radius-md);
            color: var(--prism-spark);
            font-size: var(--prism-text-sm);
            animation: shake var(--prism-dur-slow) var(--prism-ease-spring);
        }

        .login-error.visible {
            display: flex;
            align-items: center;
            gap: var(--prism-space-2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Submit button styling */
        .login-submit {
            margin-top: var(--prism-space-2);
        }

        /* Footer */
        .login-footer {
            margin-top: var(--prism-space-6);
            text-align: center;
            font-size: var(--prism-text-xs);
            color: var(--prism-text-tertiary);
        }

        .login-footer a {
            color: var(--prism-beacon);
            text-decoration: none;
            transition: color var(--prism-dur-fast) var(--prism-ease-cusp);
        }

        .login-footer a:hover {
            color: var(--prism-beacon-300);
            text-decoration: underline;
        }

        /* Password visibility toggle */
        .password-toggle {
            appearance: none;
            background: none;
            border: none;
            padding: var(--prism-space-2);
            color: var(--prism-text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--prism-dur-fast) var(--prism-ease-cusp);
        }

        .password-toggle:hover {
            color: var(--prism-text);
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            .login-bg::before,
            .login-kanji,
            .discover-btn .spinner {
                animation: none;
            }

            .login-error {
                animation: none;
            }
        }

        /* Skip link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--prism-beacon);
            color: var(--prism-black);
            padding: var(--prism-space-2) var(--prism-space-4);
            z-index: 100;
            border-radius: 0 0 var(--prism-radius-md) 0;
            transition: top var(--prism-dur-fast) var(--prism-ease-cusp);
        }

        .skip-link:focus {
            top: 0;
        }

        /* Dark mode is default */
        @media (prefers-color-scheme: light) {
            body {
                background: var(--prism-gray-50);
            }

            .login-card {
                background: rgba(255, 255, 255, 0.8);
                border-image: linear-gradient(
                    145deg,
                    rgba(0, 0, 0, 0.1) 0%,
                    rgba(0, 0, 0, 0.05) 50%,
                    rgba(255, 255, 255, 0.5) 100%
                ) 1;
            }
        }
    </style>
</head>
<body>
    <!-- Skip link for keyboard navigation -->
    <a href="#login-form" class="skip-link">Skip to login form</a>

    <!-- Ambient background -->
    <div class="login-bg" aria-hidden="true"></div>

    <main class="login-container" role="main">
        <div class="login-card">
            <!-- Header -->
            <header class="login-header">
                <div class="login-kanji" aria-hidden="true">鏡</div>
                <h1 class="login-title">KAGAMI</h1>
                <p class="login-subtitle">Connect to your home</p>
            </header>

            <!-- Login Form -->
            <form id="login-form" class="login-form" autocomplete="on" novalidate>
                <!-- Server URL with Discovery -->
                <div class="server-section">
                    <div class="server-row">
                        <div class="prism-text-field" data-colony="beacon">
                            <label class="prism-text-field__label" for="server-url">
                                Server URL
                            </label>
                            <div class="prism-text-field__container">
                                <span class="prism-text-field__prefix">
                                    <span class="prism-text-field__icon" aria-hidden="true">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"/>
                                            <line x1="2" y1="12" x2="22" y2="12"/>
                                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                                        </svg>
                                    </span>
                                </span>
                                <input
                                    type="url"
                                    id="server-url"
                                    name="server-url"
                                    class="prism-text-field__input"
                                    placeholder="http://kagami.local:8001"
                                    value="http://kagami.local:8001"
                                    autocomplete="url"
                                    required
                                    aria-describedby="server-help"
                                >
                            </div>
                            <div class="prism-text-field__helper" id="server-help">
                                Enter server address or discover automatically
                            </div>
                        </div>
                        <button type="button" id="discover-btn" class="discover-btn" aria-label="Discover local servers">
                            <span id="discover-text">Discover</span>
                        </button>
                    </div>

                    <!-- Discovered servers list -->
                    <div id="server-list" class="server-list" role="listbox" aria-label="Discovered servers">
                        <div class="server-list-empty">Click Discover to find servers</div>
                    </div>
                </div>

                <div class="login-divider">credentials</div>

                <!-- Username -->
                <div class="prism-text-field" data-colony="beacon">
                    <label class="prism-text-field__label" for="username">
                        Username
                    </label>
                    <div class="prism-text-field__container">
                        <span class="prism-text-field__prefix">
                            <span class="prism-text-field__icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </span>
                        </span>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="prism-text-field__input"
                            placeholder="admin"
                            autocomplete="username"
                            required
                            aria-required="true"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="prism-text-field" data-colony="beacon">
                    <label class="prism-text-field__label" for="password">
                        Password
                    </label>
                    <div class="prism-text-field__container">
                        <span class="prism-text-field__prefix">
                            <span class="prism-text-field__icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </span>
                        </span>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="prism-text-field__input"
                            placeholder="Enter password"
                            autocomplete="current-password"
                            required
                            aria-required="true"
                        >
                        <span class="prism-text-field__suffix prism-text-field__suffix--clickable">
                            <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password" aria-pressed="false">
                                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </span>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="login-error" class="login-error" role="alert" aria-live="assertive">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span id="error-message"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="prism-btn prism-btn--solid prism-btn--lg prism-btn--full login-submit" data-colony="beacon">
                    <span class="prism-btn__text" id="submit-text">Sign In</span>
                    <span class="prism-btn__spinner" aria-hidden="true"></span>
                </button>
            </form>

            <!-- Footer -->
            <footer class="login-footer">
                <p>Safety is our top priority.</p>
            </footer>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="js/login.js"></script>
</body>
</html>
