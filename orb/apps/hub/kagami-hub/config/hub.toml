# 鏡 Kagami Hub Configuration
# Voice-first embedded home assistant

[general]
name = "Kagami Hub"
location = "Living Room"
api_url = "http://kagami.local:8001"

[wake_word]
# Wake word engine: "porcupine" or "vosk"
engine = "porcupine"
# Sensitivity (0.0 - 1.0)
sensitivity = 0.5
# Wake phrase
phrase = "Hey Kagami"

[audio]
# Input device (use "default" for system default)
input_device = "default"
# Output device
output_device = "default"
# Sample rate
sample_rate = 16000
# Channels
channels = 1

[stt]
# Speech-to-text engine: "whisper" or "vosk"
engine = "whisper"
# Whisper model size: "tiny", "base", "small", "medium", "large"
model = "base"
# Language
language = "en"

[tts]
# Use Kagami API for TTS
use_api = true
# Colony voice
colony = "kagami"
# Volume (0.0 - 1.0)
volume = 0.8

[led_ring]
# Enable LED ring (requires GPIO)
enabled = true
# Number of LEDs
count = 7
# GPIO pin (BCM numbering)
pin = 18
# Brightness (0.0 - 1.0)
brightness = 0.5

[display]
# Display type: "none", "lcd", "eink"
type = "none"
# Width x Height
width = 128
height = 64

[commands]
# Quick command aliases
movie = "execute_scene movie_mode"
goodnight = "execute_scene goodnight"
welcome = "execute_scene welcome_home"

# 鏡
# h(x) ≥ 0. Always.
