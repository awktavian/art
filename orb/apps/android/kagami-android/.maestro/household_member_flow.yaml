# Kagami Android - Household Member Management E2E Test
#
# Tests the complete household member management flow:
#   - Member creation and editing
#   - Role and authority management
#   - Accessibility profile configuration
#   - Cultural preferences
#   - Privacy settings per household type
#
# Validates across diverse household personas:
#   - Solo senior (Ingrid)
#   - Multigenerational family (Patel)
#   - LGBTQ+ parents (Jordan & Sam)
#   - Roommate household (Tokyo)
#   - Single parent (Maria)
#   - Accessibility-focused (Michael)
#
# h(x) >= 0. For EVERYONE.

appId: com.kagami.android
name: "Household Member Management - Complete Member Lifecycle"
tags:
  - e2e
  - household
  - accessibility
  - personas

---
# ============================================================================
# NAVIGATE TO HOUSEHOLD SETTINGS
# ============================================================================
- assertVisible:
    text: "Kagami"
    description: "Verify on main screen"

- tapOn:
    id: "settings_button"
    description: "Open settings"

- assertVisible:
    text: "Settings"
    description: "Verify settings screen"

- tapOn:
    text: "Household"
    description: "Open household settings"

- assertVisible:
    text: "Household Members"
    description: "Verify household settings screen"

- takeScreenshot:
    path: "screenshots/household_01_settings"

# ============================================================================
# CREATE NEW MEMBER
# ============================================================================
- tapOn:
    id: "add_member_button"
    description: "Add new member"

- assertVisible:
    text: "Add Member"
    description: "Verify member creation form"

# Fill in member name
- inputText:
    id: "member_name_input"
    text: "Alex"
    description: "Enter member name"

# Select role
- tapOn:
    id: "role_selector"
    description: "Open role selector"

- tapOn:
    text: "Member"
    description: "Select member role"

- takeScreenshot:
    path: "screenshots/household_02_create_member"

# Save member
- tapOn:
    id: "save_button"
    description: "Save new member"

- assertVisible:
    text: "Alex"
    description: "Verify member appears in list"

- takeScreenshot:
    path: "screenshots/household_03_member_created"

# ============================================================================
# CREATE MEMBER WITH PRONOUNS
# ============================================================================
- tapOn:
    id: "add_member_button"
    description: "Add another member"

- inputText:
    id: "member_name_input"
    text: "Jordan"
    description: "Enter member name"

# Expand pronouns section
- tapOn:
    id: "pronouns_section"
    description: "Expand pronouns section"

# Select they/them
- tapOn:
    text: "they/them"
    description: "Select they/them pronouns"

- takeScreenshot:
    path: "screenshots/household_04_member_pronouns"

# Save
- tapOn:
    id: "save_button"
    description: "Save member with pronouns"

- assertVisible:
    text: "Jordan"

# ============================================================================
# SET MEMBER AS ADMIN
# ============================================================================
- tapOn:
    id: "add_member_button"

- inputText:
    id: "member_name_input"
    text: "Admin User"

- tapOn:
    id: "save_button"

# Edit member to set as admin
- tapOn:
    text: "Admin User"
    description: "Open member for editing"

- tapOn:
    id: "role_selector"

- tapOn:
    text: "Admin"
    description: "Select admin role"

# Verify admin badge appears
- assertVisible:
    id: "admin_badge"
    description: "Admin badge should appear"

- takeScreenshot:
    path: "screenshots/household_05_admin_role"

- tapOn:
    id: "save_button"

# ============================================================================
# SET MEMBER AS CHILD WITH PARENTAL CONTROLS
# ============================================================================
- tapOn:
    id: "add_member_button"

- inputText:
    id: "member_name_input"
    text: "Little One"

- tapOn:
    id: "role_selector"

- tapOn:
    text: "Child"
    description: "Select child role"

# Verify parental controls appear
- assertVisible:
    id: "parental_controls_toggle"
    description: "Parental controls should appear for children"

- takeScreenshot:
    path: "screenshots/household_06_child_role"

- tapOn:
    id: "save_button"

# ============================================================================
# CONFIGURE ACCESSIBILITY PROFILE - LOW VISION
# ============================================================================
- tapOn:
    id: "add_member_button"

- inputText:
    id: "member_name_input"
    text: "Michael"

- tapOn:
    id: "save_button"

# Edit member
- tapOn:
    text: "Michael"

# Open accessibility section
- tapOn:
    id: "accessibility_section"
    description: "Open accessibility settings"

# Set vision level
- tapOn:
    id: "vision_level_selector"

- tapOn:
    text: "Low Vision"

# Verify large text recommendation
- assertVisible:
    text: "Large text recommended"
    description: "Low vision should show large text recommendation"

- takeScreenshot:
    path: "screenshots/household_07_low_vision"

- tapOn:
    id: "save_button"

# ============================================================================
# CONFIGURE ACCESSIBILITY PROFILE - MOTOR LIMITED
# ============================================================================
- tapOn:
    id: "add_member_button"

- inputText:
    id: "member_name_input"
    text: "Motor User"

- tapOn:
    id: "save_button"

- tapOn:
    text: "Motor User"

- tapOn:
    id: "accessibility_section"

# Set motor control
- tapOn:
    id: "motor_control_selector"

- tapOn:
    text: "Limited"

# Verify large touch targets recommendation
- assertVisible:
    text: "Large touch targets"
    description: "Motor limited should recommend large touch targets"

- takeScreenshot:
    path: "screenshots/household_08_motor_accessibility"

- tapOn:
    id: "save_button"

# ============================================================================
# CONFIGURE CULTURAL PREFERENCES - SPANISH LANGUAGE
# ============================================================================
- tapOn:
    id: "add_member_button"

- inputText:
    id: "member_name_input"
    text: "Spanish Speaker"

- tapOn:
    id: "save_button"

- tapOn:
    text: "Spanish Speaker"

# Open cultural preferences
- tapOn:
    id: "cultural_section"
    description: "Open cultural preferences"

# Set primary language
- tapOn:
    id: "language_selector"

- tapOn:
    text: "Spanish"

- takeScreenshot:
    path: "screenshots/household_09_spanish_language"

- tapOn:
    id: "save_button"

# ============================================================================
# CONFIGURE PRIVACY ORIENTATION - INDIVIDUALIST
# ============================================================================
- tapOn:
    id: "add_member_button"

- inputText:
    id: "member_name_input"
    text: "Privacy User"

- tapOn:
    id: "save_button"

- tapOn:
    text: "Privacy User"

- tapOn:
    id: "cultural_section"

# Set privacy orientation
- tapOn:
    id: "privacy_orientation_selector"

- tapOn:
    text: "Individualist"

# Verify privacy boundaries explained
- assertVisible:
    text: "Personal data not shared"

- takeScreenshot:
    path: "screenshots/household_10_individualist_privacy"

- tapOn:
    id: "save_button"

# ============================================================================
# SET HOUSEHOLD TYPE - SOLO SENIOR
# ============================================================================
- tapOn:
    id: "household_type_selector"
    description: "Open household type selector"

- tapOn:
    text: "Solo Senior"
    description: "Select solo senior household type"

# Verify accessibility defaults applied
- assertVisible:
    id: "accessibility_defaults_applied"

- assertVisible:
    text: "Large text enabled"

- assertVisible:
    text: "Emergency features prioritized"

- takeScreenshot:
    path: "screenshots/household_11_solo_senior_type"

# ============================================================================
# SET HOUSEHOLD TYPE - ROOMMATES
# ============================================================================
- tapOn:
    id: "household_type_selector"

- tapOn:
    text: "Roommates"

# Verify privacy defaults applied
- assertVisible:
    text: "Individual privacy zones"

- assertVisible:
    text: "Shared spaces only"

- takeScreenshot:
    path: "screenshots/household_12_roommates_type"

# ============================================================================
# SET HOUSEHOLD TYPE - MULTIGENERATIONAL
# ============================================================================
- tapOn:
    id: "household_type_selector"

- tapOn:
    text: "Multigenerational"

# Verify family features enabled
- assertVisible:
    text: "Family calendar"

- assertVisible:
    text: "Elder care features"

- assertVisible:
    text: "Child safety"

- takeScreenshot:
    path: "screenshots/household_13_multigenerational_type"

# ============================================================================
# SET HOUSEHOLD TYPE - LGBTQ+ PARENTS
# ============================================================================
- tapOn:
    id: "household_type_selector"

- tapOn:
    text: "LGBTQ+ Parents"

# Verify inclusive features
- assertVisible:
    text: "Inclusive terminology"

- assertVisible:
    text: "Custom family roles"

- takeScreenshot:
    path: "screenshots/household_14_lgbtq_parents_type"

# ============================================================================
# SET EMERGENCY CONTACT
# ============================================================================
- tapOn:
    text: "Alex"
    description: "Edit first member"

- tapOn:
    id: "emergency_section"
    description: "Open emergency section"

- tapOn:
    id: "is_emergency_contact_toggle"
    description: "Mark as emergency contact"

# Verify emergency badge
- assertVisible:
    text: "Emergency Contact"

- takeScreenshot:
    path: "screenshots/household_15_emergency_contact"

- tapOn:
    id: "save_button"

# ============================================================================
# DELETE MEMBER
# ============================================================================
- tapOn:
    id: "add_member_button"

- inputText:
    id: "member_name_input"
    text: "To Be Deleted"

- tapOn:
    id: "save_button"

# Swipe to delete (or use delete button)
- swipe:
    element:
        text: "To Be Deleted"
    direction: "LEFT"
    description: "Swipe to reveal delete"

- tapOn:
    text: "Delete"
    description: "Delete member"

- tapOn:
    text: "Confirm"
    description: "Confirm deletion"

# Verify member removed
- assertNotVisible:
    text: "To Be Deleted"
    description: "Member should be removed"

- takeScreenshot:
    path: "screenshots/household_16_member_deleted"

# ============================================================================
# FINAL MEMBER LIST
# ============================================================================
- assertVisible:
    text: "Alex"

- assertVisible:
    text: "Jordan"

- assertVisible:
    text: "Admin User"

- assertVisible:
    text: "Little One"

- assertVisible:
    text: "Michael"

- takeScreenshot:
    path: "screenshots/household_17_final_member_list"

# ============================================================================
# Test completed successfully
# h(x) >= 0. For EVERYONE.
# ============================================================================
