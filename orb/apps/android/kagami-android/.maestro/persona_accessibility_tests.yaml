# display these correctly throughout the interface.
# ------------------------------------------------------------------------------

- tapOn:
    id: "add_member_button"
    optional: true

- inputText:
    id: "member_name_input"
    text: "Jordan"
    optional: true

- tapOn:
    id: "pronouns_section"
    optional: true

- tapOn:
    text: "they/them"
    optional: true

- takeScreenshot:
    path: "screenshots/jordansam_02_pronoun_selection_theythem"

- tapOn:
    id: "save_button"
    optional: true

# Verify pronouns are displayed after saving
- assertVisible:
    text: "they"
    description: "Selected pronouns must be displayed after save"
    optional: true

- takeScreenshot:
    path: "screenshots/jordansam_03_pronouns_displayed"

# ------------------------------------------------------------------------------
# TEST: Custom Pronoun Entry
# ------------------------------------------------------------------------------
# Not everyone uses standard pronoun sets. Neopronouns like xe/xem
# or custom sets must be enterable. The app doesn't judge - it reflects.
# ------------------------------------------------------------------------------

- tapOn:
    id: "add_member_button"
    optional: true

- inputText:
    id: "member_name_input"
    text: "Alex"
    optional: true

- tapOn:
    id: "pronouns_section"
    optional: true

- tapOn:
    text: "Custom"
    optional: true

- assertVisible:
    id: "pronoun_subject_field"
    description: "Custom pronoun entry fields must appear"
    optional: true

- takeScreenshot:
    path: "screenshots/jordansam_04_custom_pronoun_entry"

- pressKey: BACK
- pressKey: BACK

# ------------------------------------------------------------------------------
