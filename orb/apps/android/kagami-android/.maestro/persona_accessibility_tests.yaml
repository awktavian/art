# ==============================================================================
# FLOW 6: JORDAN & SAM - LGBTQ+ PARENTS INCLUSIVE HOUSEHOLD
# ==============================================================================
# Jordan (they/them) and Sam (she/her) are married with two kids.
# The app must respect their identities and family structure:
#
#   - Pronouns displayed correctly throughout
#   - "Parent" not "Mom/Dad" as default terminology
#   - Custom pronouns supported (not just presets)
#   - Equal notification priority (no "primary parent" assumptions)
#   - Custom family roles honor how they define their family
#   - Non-gendered icons avoid binary assumptions
#
# This isn't about "political correctness" - it's about the app
# accurately representing the people who use it.
# ==============================================================================

---
name: "Jordan & Sam: LGBTQ+ Parents Inclusive Household"

- clearState

- launchApp:
    appId: com.kagami.android
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      text: "Kagami"
    timeout: ${WAIT_TIMEOUT}

# ------------------------------------------------------------------------------
# TEST: Configure Household as LGBTQ+ Parents
# ------------------------------------------------------------------------------
# This unlocks inclusive terminology and removes heteronormative assumptions.
# "Parent" replaces "Mom/Dad". Custom pronouns become available.
# ------------------------------------------------------------------------------

- tapOn:
    id: "settings_button"

- tapOn:
    text: "Household"
    optional: true

- tapOn:
    id: "household_type_selector"
    optional: true

- tapOn:
    text: "LGBTQ+ Parents"
    optional: true

- assertVisible:
    text: "Inclusive terminology"
    description: "Inclusive terminology confirmation must appear"
    optional: true

- takeScreenshot:
    path: "screenshots/jordansam_01_household_type_lgbtq_parents"

# ------------------------------------------------------------------------------
# TEST: Pronoun Selection
# ------------------------------------------------------------------------------
