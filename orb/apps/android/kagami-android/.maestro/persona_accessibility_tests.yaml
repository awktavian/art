---
# ==============================================================================
# FLOW 7: HAPTIC FEEDBACK TESTS (ALL PERSONAS) [HAPTIC]
# ==============================================================================
# Haptic feedback provides physical confirmation of actions. This is critical
# for blind users (Michael) and useful for everyone.
#
# The unified audio design system defines these haptic patterns:
#   - SUCCESS: 144ms pulse on successful actions
#   - SELECTION: 89ms tick on item selection
#   - LIGHT_ON: Rising progressive pattern
#   - LIGHT_OFF: Falling progressive pattern
#   - ERROR: Double pulse on failures
#   - SOS: Urgent triple pulse
#
# NOTE: These tests verify that haptic TRIGGERS exist. Actual vibration
# patterns cannot be programmatically verified and require manual QA.
# The tests document what SHOULD happen for manual verification.
# ==============================================================================

---
name: "Haptic Feedback Tests (All Personas)"

- clearState

- launchApp:
    appId: com.kagami.android
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      text: "Kagami"
    timeout: ${WAIT_TIMEOUT}

# ------------------------------------------------------------------------------
# TEST: Success Haptic on Scene Activation [HAPTIC]
# ------------------------------------------------------------------------------
# When a scene activates successfully, a 144ms success haptic should play.
# Manual verification: Feel for a single satisfying pulse.
# ------------------------------------------------------------------------------

- tapOn:
    id: "scenes_tab"
    optional: true

- tapOn:
    id: "first_scene"
    description: "[HAPTIC] Activating scene - expect 144ms success pulse"
    optional: true

- takeScreenshot:
    path: "screenshots/haptic_01_success_scene_activation"

# ------------------------------------------------------------------------------
# TEST: Selection Haptic on Tap [HAPTIC]
# ------------------------------------------------------------------------------
# When selecting a list item, an 89ms selection tick should play.
# Manual verification: Feel for a light tick.
# ------------------------------------------------------------------------------

- tapOn:
    id: "rooms_tab"
    optional: true

- tapOn:
    id: "first_room"
    description: "[HAPTIC] Selecting room - expect 89ms selection tick"
    optional: true

- takeScreenshot:
    path: "screenshots/haptic_02_selection_tick"

# ------------------------------------------------------------------------------
# TEST: Light Control Haptics [HAPTIC]
# ------------------------------------------------------------------------------
# Lights on: Rising progressive haptic (builds up)
# Lights off: Falling progressive haptic (winds down)
# Manual verification: Feel for directional patterns.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- tapOn:
    id: "lights_on_button"
    description: "[HAPTIC] Lights on - expect RISING progressive pattern"
    optional: true

- takeScreenshot:
    path: "screenshots/haptic_03_light_on_rising"

- tapOn:
    id: "lights_off_button"
    description: "[HAPTIC] Lights off - expect FALLING progressive pattern"
    optional: true

- takeScreenshot:
    path: "screenshots/haptic_04_light_off_falling"

# ------------------------------------------------------------------------------
# TEST: Reduced Motion Toggle
# ------------------------------------------------------------------------------
# Users who are sensitive to motion can disable animations. This should
# also affect haptic intensity for users who find vibration uncomfortable.
# ------------------------------------------------------------------------------

- tapOn:
    id: "settings_button"

- tapOn:
    text: "Accessibility"

- tapOn:
    id: "reduced_motion_toggle"
    description: "Enable reduced motion for motion-sensitive users"
    optional: true

- takeScreenshot:
    path: "screenshots/haptic_05_reduced_motion_toggle"

- pressKey: BACK


