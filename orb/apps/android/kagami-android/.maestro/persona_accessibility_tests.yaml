#   - Motor-limited users who need large targets and dwell time
#   - Multigenerational families with elders and children
#   - Privacy-conscious roommates who share space but not data
#   - LGBTQ+ families who deserve accurate representation
#
# h(x) >= 0. For EVERYONE. No exceptions.
#
