# ==============================================================================
#
#   KAGAMI ANDROID - COMPREHENSIVE PERSONA ACCESSIBILITY E2E TESTS
#
#   "h(x) >= 0. For EVERYONE."
#
# ==============================================================================
#
# This test suite validates accessibility and household features for 6 distinct
# personas, each representing real users with unique needs:
#
#   1. INGRID (Solo Senior, 78yo)
#      - Low vision requiring large text and high contrast
#      - Motor challenges needing large touch targets (56dp minimum)
#      - Emergency access is CRITICAL - SOS must be reachable everywhere
#      - Voice announcements for status updates she can hear, not just see
#
#   2. MICHAEL (Blind User, 42yo)
#      - Complete TalkBack reliance - every element needs content descriptions
#      - Voice-first interaction model - voice commands are primary, not optional
#      - Haptic navigation feedback provides spatial awareness
#      - Focus order must be logical and predictable
#
#   3. MARIA (Motor Limited, 35yo)
#      - Reduced fine motor control - needs large, well-spaced targets
#      - Dwell time activation - holding replaces precise tapping
#      - Simplified UI reduces cognitive and motor load
#      - SOS access is life-critical - must be reachable from ANY screen
#
#   4. PATEL FAMILY (Multigenerational)
#      - Three generations under one roof with different needs
#      - Elder care monitoring for grandmother (activity alerts)
#      - Child safety controls for the kids (device restrictions, bedtimes)
#      - Shared family calendar keeps everyone coordinated
#      - Profile switching allows different family members to use the app
#
#   5. TOKYO ROOMMATES (Privacy-Focused)
#      - Three unrelated adults sharing space but NOT lives
#      - Strict data isolation - your room is YOUR room
#      - Privacy boundaries are visualized and enforced
#      - Quiet mode respects different schedules
#      - Shared spaces (kitchen, living) accessible; private rooms are not
#
#   6. JORDAN & SAM (LGBTQ+ Parents)
#      - Gender-neutral terminology by default ("Parent" not "Mom/Dad")
#      - Full pronoun support including custom pronouns
#      - Equal notification priority - both parents matter equally
#      - Non-gendered icons avoid assumptions
#      - Custom family roles honor how each family defines itself
#
# ------------------------------------------------------------------------------
# RUNNING THESE TESTS
# ------------------------------------------------------------------------------
#
#   # Run all persona tests:
#   maestro test .maestro/persona_accessibility_tests.yaml
#
#   # Run with verbose output:
#   maestro test .maestro/persona_accessibility_tests.yaml --debug-output
#
#   # Run specific flow by name:
#   maestro test .maestro/persona_accessibility_tests.yaml --flow "Ingrid: Solo Senior Accessibility"
#
# ------------------------------------------------------------------------------
# PREREQUISITES
# ------------------------------------------------------------------------------
#
#   - App installed: com.kagami.android
#   - Demo/test mode enabled in app (or first-run state)
#   - Device/emulator running with accessibility services available
#
# ------------------------------------------------------------------------------
# NOTE ON HAPTIC TESTS
# ------------------------------------------------------------------------------
#
#   Tests marked [HAPTIC] verify that haptic feedback is triggered at the right
#   moments. However, actual vibration patterns cannot be programmatically
#   verified by Maestro. Manual verification is required to confirm:
#
#     - Success haptic (144ms pulse) on scene activation
#     - Selection haptic (89ms tick) on item selection
#     - Rising haptic (progressive) on lights on
#     - Falling haptic (reverse) on lights off
#     - Error haptic (double pulse) on failures
#
#   These tests ensure the triggers exist; manual QA confirms the patterns.
#
# ==============================================================================

appId: com.kagami.android

# Global timeout for wait operations - ensures reliability on slower devices
env:
  WAIT_TIMEOUT: "10000"

tags:
  - e2e
  - personas
  - accessibility
  - household
  - a11y


# ==============================================================================
# FLOW 1: INGRID - SOLO SENIOR ACCESSIBILITY
# ==============================================================================
# Ingrid is 78 years old, living alone. She has low vision and some motor
# challenges. The emergency SOS feature isn't just convenient for her - it's
# potentially life-saving. Every screen must have SOS access. Every button
# must be large enough for aging hands. Every status must be announced aloud.
#
# Key requirements:
#   - Emergency SOS button visible on EVERY screen
#   - Touch targets minimum 56dp (Android Material large target spec)
#   - High contrast mode for low vision
#   - Voice announcements for status changes
#   - Triple-tap SOS activation for emergency situations
# ==============================================================================

---
name: "Ingrid: Solo Senior Accessibility"

- clearState

- launchApp:
    appId: com.kagami.android
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      text: "Kagami"
    timeout: ${WAIT_TIMEOUT}

# ------------------------------------------------------------------------------
# TEST: Emergency Button Always Visible
# ------------------------------------------------------------------------------
# For Ingrid, the emergency button isn't optional UI - it's a lifeline.
# We verify it's present on every major screen: Home, Rooms, Scenes.
# If she falls in any context, help must be one tap away.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- assertVisible:
    id: "emergency_sos_button"
    description: "SOS button must be visible on Home screen"
    optional: true

- takeScreenshot:
    path: "screenshots/ingrid_01_emergency_button_home"

- tapOn:
    id: "rooms_tab"
    optional: true

- assertVisible:
    id: "emergency_sos_button"
    description: "SOS button must be visible on Rooms screen"
    optional: true

- takeScreenshot:
    path: "screenshots/ingrid_02_emergency_button_rooms"

- tapOn:
    id: "scenes_tab"
    optional: true

- assertVisible:
    id: "emergency_sos_button"
    description: "SOS button must be visible on Scenes screen"
    optional: true

- takeScreenshot:
    path: "screenshots/ingrid_03_emergency_button_scenes"

# ------------------------------------------------------------------------------
# TEST: Emergency Button Large Touch Target
# ------------------------------------------------------------------------------
# The SOS button must be at least 56dp - the Android Material spec for large
# touch targets. Ingrid's hands may shake; the target must be forgiving.
# Long press reveals emergency contacts for quick dialing.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- longPressOn:
    id: "emergency_sos_button"
    description: "Long press reveals emergency contact quick-dial"
    optional: true

- extendedWaitUntil:
    visible:
      id: "emergency_contact_sheet"
    timeout: ${WAIT_TIMEOUT}

- assertVisible:
    id: "emergency_contact_sheet"
    description: "Emergency contacts sheet should appear on long press"
    optional: true

- takeScreenshot:
    path: "screenshots/ingrid_04_emergency_contacts_sheet"

- pressKey: BACK

# ------------------------------------------------------------------------------
# TEST: SOS Triple Tap Activation
# ------------------------------------------------------------------------------
# Triple-tap is an accessibility pattern that works even with shaking hands.
# Three taps anywhere on the SOS button triggers a confirmation dialog.
# This prevents accidental calls while remaining accessible.
# ------------------------------------------------------------------------------

- tapOn:
    id: "emergency_sos_button"
    optional: true
    description: "Triple-tap sequence: tap 1 of 3"

- tapOn:
    id: "emergency_sos_button"
    optional: true
    description: "Triple-tap sequence: tap 2 of 3"

- tapOn:
    id: "emergency_sos_button"
    optional: true
    description: "Triple-tap sequence: tap 3 of 3 - triggers confirmation"

- extendedWaitUntil:
    visible:
      id: "sos_confirmation_dialog"
    timeout: ${WAIT_TIMEOUT}

- assertVisible:
    id: "sos_confirmation_dialog"
    description: "SOS confirmation dialog appears after triple-tap"
    optional: true

- takeScreenshot:
    path: "screenshots/ingrid_05_sos_confirmation_dialog"

# Cancel to avoid actually triggering emergency services
- tapOn:
    text: "Cancel"
    optional: true

# ------------------------------------------------------------------------------
# TEST: Large Text and High Contrast Settings
# ------------------------------------------------------------------------------
# Ingrid needs high contrast colors and larger fonts. The accessibility
# settings should make these easy to enable. We verify the controls exist
# and that enabling them actually changes the home screen appearance.
# ------------------------------------------------------------------------------

- tapOn:
    id: "settings_button"

- tapOn:
    text: "Accessibility"

# Enable large touch targets (affects all interactive elements)
- tapOn:
    id: "large_touch_targets_toggle"
    optional: true
    description: "Enable 56dp minimum touch targets throughout app"

# Enable high contrast mode (improves text/background distinction)
- tapOn:
    id: "high_contrast_toggle"
    optional: true
    description: "Enable high contrast mode for low vision users"

# Increase font size using slider
- swipe:
    element:
      id: "font_size_slider"
    direction: "RIGHT"
    optional: true
    description: "Increase font size to maximum for readability"

- takeScreenshot:
    path: "screenshots/ingrid_06_accessibility_settings_configured"

- pressKey: BACK

- tapOn:
    id: "home_tab"
    optional: true

- takeScreenshot:
    path: "screenshots/ingrid_07_home_with_large_text_high_contrast"

# ------------------------------------------------------------------------------
# TEST: Voice Status Announcements
# ------------------------------------------------------------------------------
# When Ingrid turns on lights or activates a scene, she needs to HEAR
# confirmation, not just see it. Voice announcements provide this feedback.
# ------------------------------------------------------------------------------

- tapOn:
    id: "settings_button"

- tapOn:
    text: "Accessibility"

- tapOn:
    id: "voice_status_announcements_toggle"
    description: "Enable spoken confirmations for all actions"
    optional: true

- takeScreenshot:
    path: "screenshots/ingrid_08_voice_announcements_enabled"

- pressKey: BACK

# ------------------------------------------------------------------------------
# TEST: Focus Navigation (Keyboard/Switch Access)
# ------------------------------------------------------------------------------
# Users with motor impairments may use external switches or keyboards.
# Tab navigation must follow a logical order through the interface.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

# Test Tab navigation moves through elements in logical order
- pressKey: TAB
- pressKey: TAB
- pressKey: TAB

- takeScreenshot:
    path: "screenshots/ingrid_09_focus_navigation_test"


---
# ==============================================================================
# FLOW 2: MICHAEL - BLIND USER ACCESSIBILITY (TALKBACK)
# ==============================================================================
# Michael is 42, completely blind, and relies entirely on TalkBack. For him,
# visual design is irrelevant - what matters is:
#   - Every element has a meaningful content description
#   - Focus order follows a logical reading flow
#   - Voice commands provide full app control
#   - Haptic feedback confirms actions spatially
#
# If an element doesn't have a content description, it doesn't exist for Michael.
# ==============================================================================

---
name: "Michael: Blind User TalkBack Accessibility"

- clearState

- launchApp:
    appId: com.kagami.android
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      text: "Kagami"
    timeout: ${WAIT_TIMEOUT}

# ------------------------------------------------------------------------------
# TEST: All Elements Have Content Descriptions
# ------------------------------------------------------------------------------
# Every interactive element MUST have a content description. This is how
# TalkBack announces what things are. Without descriptions, buttons are
# just "Button" - useless for navigation.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

# The Kanji character needs a description like "Home" or "Kagami"
- assertVisible:
    id: "home_kanji"
    description: "Kanji character must have content description for TalkBack"
    optional: true

# Safety card should announce its purpose
- assertVisible:
    id: "home_safety_card"
    description: "Safety card must be labeled for screen readers"
    optional: true

# Safety score should announce the actual value
- assertVisible:
    id: "home_safety_score"
    description: "Safety score must announce numeric value"
    optional: true

- takeScreenshot:
    path: "screenshots/michael_01_content_descriptions_home"

# ------------------------------------------------------------------------------
# TEST: TalkBack Navigation Order
# ------------------------------------------------------------------------------
# Focus order must be logical: header -> main content -> actions -> navigation.
# Random focus order creates a confusing, unusable experience.
# ------------------------------------------------------------------------------

- tapOn:
    id: "rooms_tab"
    optional: true

- assertVisible:
    id: "rooms_list"
    description: "Rooms list must be navigable via TalkBack"
    optional: true

# Test Tab navigation follows logical order
- pressKey: TAB
- pressKey: TAB

- takeScreenshot:
    path: "screenshots/michael_02_rooms_navigation_order"

# ------------------------------------------------------------------------------
# TEST: Scene Activation Voice Announcement
# ------------------------------------------------------------------------------
# When Michael activates a scene, he can't see the visual confirmation.
# The app must announce "Scene activated: Movie Night" or similar.
# ------------------------------------------------------------------------------

- tapOn:
    id: "scenes_tab"
    optional: true

- assertVisible:
    id: "scenes_list"
    description: "Scenes must be accessible and labeled"
    optional: true

- takeScreenshot:
    path: "screenshots/michael_03_scenes_accessible"

# ------------------------------------------------------------------------------
# TEST: Voice Command Activation
# ------------------------------------------------------------------------------
# Voice commands are Michael's primary input method. The voice command
# button must be easily discoverable and clearly labeled.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- assertVisible:
    id: "voice_command_button"
    description: "Voice command must be accessible - it's primary input for blind users"
    optional: true

- takeScreenshot:
    path: "screenshots/michael_04_voice_command_accessible"

# ------------------------------------------------------------------------------
# TEST: Haptic Navigation Feedback [HAPTIC]
# ------------------------------------------------------------------------------
# Haptic feedback helps Michael understand spatial layout. Different
# vibration patterns indicate different element types:
#   - Light tick for list items
#   - Stronger pulse for buttons
#   - Double pulse for warnings
#
# NOTE: Actual haptic patterns require manual verification.
# This test ensures the setting exists and can be enabled.
# ------------------------------------------------------------------------------

- tapOn:
    id: "settings_button"

- tapOn:
    text: "Accessibility"

- tapOn:
    id: "haptic_navigation_feedback_toggle"
    description: "Enable haptic feedback for navigation"
    optional: true

- takeScreenshot:
    path: "screenshots/michael_05_haptic_navigation_enabled"

- pressKey: BACK

# ------------------------------------------------------------------------------
# TEST: Focus Navigation (Keyboard/Switch Access)
# ------------------------------------------------------------------------------
# Tab navigation test for accessibility switches
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- pressKey: TAB
- pressKey: TAB
- pressKey: TAB
- pressKey: TAB

- takeScreenshot:
    path: "screenshots/michael_06_focus_navigation"


---
# ==============================================================================
# FLOW 3: MARIA - MOTOR LIMITED ACCESSIBILITY
# ==============================================================================
# Maria is 35 with limited motor control due to a neurological condition.
# Precise tapping is difficult; small targets are impossible. She needs:
#   - Large touch targets (56dp minimum, preferably larger)
#   - Adequate spacing between targets (prevents mis-taps)
#   - Dwell time activation (hold to activate instead of tap)
#   - Simplified UI (fewer elements = less motor demand)
#   - SOS accessible from EVERYWHERE (life safety requirement)
# ==============================================================================

---
name: "Maria: Motor Limited Accessibility"

- clearState

- launchApp:
    appId: com.kagami.android
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      text: "Kagami"
    timeout: ${WAIT_TIMEOUT}

# ------------------------------------------------------------------------------
# TEST: SOS Button Large Touch Target
# ------------------------------------------------------------------------------
# The SOS button MUST be at least 56dp. For Maria, this isn't about
# convenience - it's about being able to call for help when her
# tremors are worst.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- assertVisible:
    id: "emergency_sos_button"
    description: "SOS button must be large (56dp+) for motor limited users"
    optional: true

- takeScreenshot:
    path: "screenshots/maria_01_sos_large_touch_target"

# ------------------------------------------------------------------------------
# TEST: SOS Accessible From Every Screen
# ------------------------------------------------------------------------------
# Maria might need help from any context. SOS must be reachable from
# Home, Rooms, Scenes, and even Settings. No exceptions.
# ------------------------------------------------------------------------------

- tapOn:
    id: "rooms_tab"
    optional: true

- assertVisible:
    id: "emergency_sos_button"
    description: "SOS must be on Rooms screen"
    optional: true

- takeScreenshot:
    path: "screenshots/maria_02_sos_on_rooms"

- tapOn:
    id: "scenes_tab"
    optional: true

- assertVisible:
    id: "emergency_sos_button"
    description: "SOS must be on Scenes screen"
    optional: true

- takeScreenshot:
    path: "screenshots/maria_03_sos_on_scenes"

- tapOn:
    id: "settings_button"

- assertVisible:
    id: "emergency_sos_button"
    description: "SOS must be on Settings screen"
    optional: true

- takeScreenshot:
    path: "screenshots/maria_04_sos_on_settings"

# ------------------------------------------------------------------------------
# TEST: All Buttons Large Targets
# ------------------------------------------------------------------------------
# When large touch targets mode is enabled, ALL buttons must grow to 56dp+.
# This affects the entire UI, not just the SOS button.
# ------------------------------------------------------------------------------

- tapOn:
    text: "Accessibility"

- tapOn:
    id: "large_touch_targets_toggle"
    optional: true
    description: "Enable large touch targets throughout the app"

- pressKey: BACK

- tapOn:
    id: "rooms_tab"
    optional: true

- takeScreenshot:
    path: "screenshots/maria_05_all_buttons_large"

# ------------------------------------------------------------------------------
# TEST: Button Spacing Adequate
# ------------------------------------------------------------------------------
# Even with large targets, buttons packed together cause mis-taps.
# Minimum 8dp spacing between interactive elements is required.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- takeScreenshot:
    path: "screenshots/maria_06_button_spacing"

# ------------------------------------------------------------------------------
# TEST: Dwell Time Activation
# ------------------------------------------------------------------------------
# Dwell time lets Maria activate buttons by HOLDING, not tapping.
# This is critical for users who can't produce clean, quick taps.
# We configure dwell time to 2 seconds.
# ------------------------------------------------------------------------------

- tapOn:
    id: "settings_button"

- tapOn:
    text: "Accessibility"

- tapOn:
    id: "dwell_time_toggle"
    description: "Enable dwell time activation"
    optional: true

# Set dwell time to 2 seconds using slider
- swipe:
    element:
      id: "dwell_time_slider"
    direction: "RIGHT"
    optional: true
    description: "Set dwell time to 2 seconds"

- takeScreenshot:
    path: "screenshots/maria_07_dwell_time_configured"

# ------------------------------------------------------------------------------
# TEST: Simplified UI
# ------------------------------------------------------------------------------
# Simplified UI removes non-essential elements, reducing the motor and
# cognitive load. Fewer targets = fewer decisions = less fatigue.
# ------------------------------------------------------------------------------

- tapOn:
    id: "simplified_ui_toggle"
    optional: true
    description: "Enable simplified UI mode"

- pressKey: BACK

- takeScreenshot:
    path: "screenshots/maria_08_simplified_ui_enabled"

# ------------------------------------------------------------------------------
# TEST: Focus Navigation (Keyboard/Switch Access)
# ------------------------------------------------------------------------------
# Maria may use switch access or a head tracker. Tab navigation must work.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- pressKey: TAB
- pressKey: TAB
- pressKey: TAB

- takeScreenshot:
    path: "screenshots/maria_09_focus_navigation"


---
# ==============================================================================
# FLOW 4: PATEL FAMILY - MULTIGENERATIONAL HOUSEHOLD
# ==============================================================================
# The Patel household has three generations: grandparents, parents, and kids.
# Each generation has different needs:
#
#   Grandmother (80+): Activity monitoring, inactivity alerts
#   Parents (40s): Oversight of both elders and children
#   Kids (8-14): Device restrictions, bedtime modes, safety controls
#
# The app must serve ALL of them without compromising anyone's autonomy.
# Profile switching allows each family member their own experience.
# ==============================================================================

---
name: "Patel Family: Multigenerational Household"

- clearState

- launchApp:
    appId: com.kagami.android
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      text: "Kagami"
    timeout: ${WAIT_TIMEOUT}

# ------------------------------------------------------------------------------
# TEST: Configure Household as Multigenerational
# ------------------------------------------------------------------------------
# This unlocks features specific to multi-generation households:
# elder care, child safety, profile switching, shared calendar.
# ------------------------------------------------------------------------------

- tapOn:
    id: "settings_button"

- tapOn:
    text: "Household"
    optional: true

- tapOn:
    id: "household_type_selector"
    optional: true

- tapOn:
    text: "Multigenerational"
    optional: true

- takeScreenshot:
    path: "screenshots/patel_01_household_type_multigenerational"

# ------------------------------------------------------------------------------
# TEST: Elder Care Alerts Configuration
# ------------------------------------------------------------------------------
# Activity monitoring watches for signs that grandmother might need help.
# If no activity is detected for a configured period, alerts are sent.
# This is about dignity - she maintains independence while family has peace of mind.
# ------------------------------------------------------------------------------

- tapOn:
    id: "elder_care_settings"
    description: "Configure elder care monitoring"
    optional: true

- assertVisible:
    id: "activity_monitoring_toggle"
    description: "Activity monitoring must be available for elder care"
    optional: true

- takeScreenshot:
    path: "screenshots/patel_02_elder_care_settings"

# ------------------------------------------------------------------------------
# TEST: Inactivity Alert Configuration
# ------------------------------------------------------------------------------
# Set the threshold for how long without activity before alerting.
# Too short = annoying false alarms. Too long = defeats the purpose.
# ------------------------------------------------------------------------------

- tapOn:
    id: "activity_monitoring_toggle"
    optional: true

- swipe:
    element:
      id: "inactivity_threshold_slider"
    direction: "RIGHT"
    optional: true
    description: "Configure inactivity threshold duration"

- takeScreenshot:
    path: "screenshots/patel_03_inactivity_alert_configured"

- pressKey: BACK

# ------------------------------------------------------------------------------
# TEST: Child Safety Controls
# ------------------------------------------------------------------------------
# The kids need boundaries: restricted devices, bedtime modes, content
# filtering. Child mode enables parental oversight without being punitive.
# ------------------------------------------------------------------------------

- tapOn:
    id: "child_safety_settings"
    description: "Configure child safety controls"
    optional: true

- assertVisible:
    id: "child_mode_toggle"
    description: "Child mode must be available"
    optional: true

- takeScreenshot:
    path: "screenshots/patel_04_child_safety_settings"

# ------------------------------------------------------------------------------
# TEST: Child Restricted Devices
# ------------------------------------------------------------------------------
# Certain smart home devices shouldn't be controllable by kids:
# door locks, thermostats, security systems. Parents configure which.
# ------------------------------------------------------------------------------

- tapOn:
    id: "restricted_devices"
    optional: true

- assertVisible:
    id: "device_restriction_list"
    description: "Device restrictions must be configurable"
    optional: true

- takeScreenshot:
    path: "screenshots/patel_05_restricted_devices"

- pressKey: BACK

# ------------------------------------------------------------------------------
# TEST: Bedtime Mode Configuration
# ------------------------------------------------------------------------------
# At bedtime, certain devices turn off or become inaccessible for kids.
# The house helps enforce healthy sleep habits.
# ------------------------------------------------------------------------------

- tapOn:
    id: "bedtime_mode"
    optional: true

- assertVisible:
    id: "bedtime_start_picker"
    description: "Bedtime scheduling must be configurable"
    optional: true

- takeScreenshot:
    path: "screenshots/patel_06_bedtime_mode_configured"

- pressKey: BACK
- pressKey: BACK

# ------------------------------------------------------------------------------
# TEST: Family Calendar View
# ------------------------------------------------------------------------------
# Shared calendar keeps everyone coordinated: doctor appointments,
# school events, family dinners. Everyone sees what matters to them.
# ------------------------------------------------------------------------------

- tapOn:
    id: "home_tab"
    optional: true

- assertVisible:
    id: "family_calendar_widget"
    description: "Shared family calendar must be visible on home"
    optional: true

- takeScreenshot:
    path: "screenshots/patel_07_family_calendar"

# ------------------------------------------------------------------------------
# TEST: Profile Switching
# ------------------------------------------------------------------------------
# Each family member has their own profile with appropriate permissions.
# Kids see kid-appropriate views. Parents see oversight tools.
# Grandparents see simplified, accessible interfaces.
# ------------------------------------------------------------------------------

- tapOn:
    id: "profile_switcher"
    description: "Open profile switcher to change active user"
    optional: true

- assertVisible:
    id: "profile_list"
    description: "Profile list must show all family members"
    optional: true

- takeScreenshot:
    path: "screenshots/patel_08_profile_switcher"

- pressKey: BACK


---
# ==============================================================================
# FLOW 5: TOKYO ROOMMATES - PRIVACY-FOCUSED HOUSEHOLD
# ==============================================================================
# Three unrelated adults share an apartment in Tokyo. They're NOT a family.
# Privacy isn't a preference - it's a requirement. Each person's space is
# their own. Data isolation is enforced, not optional.
#
# Key requirements:
#   - Roommate A cannot see Roommate B's room or devices
#   - Shared spaces (kitchen, living) are accessible to all
#   - Private rooms are invisible to others
#   - Quiet mode respects different schedules
#   - No cross-contamination of personal data
# ==============================================================================

---
name: "Tokyo Roommates: Privacy-Focused Household"

- clearState

- launchApp:
    appId: com.kagami.android
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      text: "Kagami"
    timeout: ${WAIT_TIMEOUT}

# ------------------------------------------------------------------------------
# TEST: Configure Household as Roommates
# ------------------------------------------------------------------------------
# Roommates mode enables strict privacy zones. Each person only sees
# and controls their own space plus explicitly shared areas.
# ------------------------------------------------------------------------------

- tapOn:
    id: "settings_button"

- tapOn:
    text: "Household"
    optional: true

- tapOn:
    id: "household_type_selector"
    optional: true

- tapOn:
    text: "Roommates"
    optional: true

- assertVisible:
    text: "Individual privacy zones"
    description: "Privacy zones must be explained when roommates mode selected"
    optional: true

- takeScreenshot:
    path: "screenshots/tokyo_01_household_type_roommates"

- pressKey: BACK

# ------------------------------------------------------------------------------
# TEST: Data Isolation Verification
# ------------------------------------------------------------------------------
# Navigate to Rooms tab. Only YOUR room and shared spaces should appear.
# Roommate private spaces must NOT be visible.
# ------------------------------------------------------------------------------

- tapOn:
    id: "rooms_tab"
    optional: true

- takeScreenshot:
    path: "screenshots/tokyo_02_data_isolation_rooms"

# ------------------------------------------------------------------------------
# TEST: Personal Room Only Access
# ------------------------------------------------------------------------------
# Verify that ONLY the current user's room is visible.
# Other roommates' bedrooms must be completely hidden, not just locked.
# ------------------------------------------------------------------------------

# Verify roommate rooms are NOT visible (privacy enforcement)
# These assertions verify that private rooms of OTHER roommates don't appear
- assertNotVisible:
    id: "roommate_a_bedroom"
    description: "Other roommate's private room must NOT be visible"
    optional: true

- assertNotVisible:
    id: "roommate_b_bedroom"
    description: "Other roommate's private room must NOT be visible"
    optional: true

- assertNotVisible:
    text: "Yuki's Room"
    description: "Roommate Yuki's private room must NOT be visible"
