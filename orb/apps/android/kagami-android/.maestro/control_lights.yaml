# Kagami Android - Control Lights E2E Test
#
# Tests light control functionality from the Rooms screen.
# Validates turning lights on, off, and dimming in different rooms.
#
# Prerequisites:
#   - App is authenticated and connected to Kagami server
#   - At least one room with lights configured
#
# h(x) >= 0. Always.

appId: com.kagami.android
name: "Control Lights - Room Light Operations"
tags:
  - e2e
  - lights
  - rooms
  - critical

---

# ============================================================================
# NAVIGATE TO HOME SCREEN
# ============================================================================
- assertVisible:
    text: "Kagami"
    description: "Verify we're on the home screen"

# Take initial screenshot
- takeScreenshot:
    path: "screenshots/lights_01_home"

# ============================================================================
# QUICK ACTIONS - LIGHTS ON
# ============================================================================
- tapOn:
    text: "Lights On"
    description: "Tap Quick Action - Lights On"

- waitForAnimationToEnd

- takeScreenshot:
    path: "screenshots/lights_02_quick_action_on"

# ============================================================================
# QUICK ACTIONS - LIGHTS OFF
# ============================================================================
- tapOn:
    text: "Lights Off"
    description: "Tap Quick Action - Lights Off"

- waitForAnimationToEnd

- takeScreenshot:
    path: "screenshots/lights_03_quick_action_off"

# ============================================================================
# NAVIGATE TO ROOMS SCREEN
# ============================================================================
- tapOn:
    text: "Rooms"
    description: "Navigate to Rooms screen"

- assertVisible:
    text: "Rooms"
    description: "Verify Rooms screen is displayed"

- waitForAnimationToEnd

- takeScreenshot:
    path: "screenshots/lights_04_rooms_screen"

# ============================================================================
# CONTROL LIGHTS IN LIVING ROOM
# ============================================================================
- scrollUntilVisible:
    element:
      text: "Living Room"
    description: "Find Living Room in the list"

- assertVisible:
    text: "Living Room"
    description: "Verify Living Room is visible"

# Turn lights to full brightness
- tapOn:
    text: "Full"
    index: 0
    description: "Set Living Room lights to full"

- waitForAnimationToEnd

- takeScreenshot:
    path: "screenshots/lights_05_living_room_full"

# Wait for state update
- wait:
    seconds: 1

# Dim the lights
- tapOn:
    text: "Dim"
    index: 0
    description: "Dim Living Room lights to 30%"

- waitForAnimationToEnd

- takeScreenshot:
    path: "screenshots/lights_06_living_room_dim"

# Wait for state update
- wait:
    seconds: 1

# Turn lights off
- tapOn:
    text: "Off"
    index: 0
    description: "Turn off Living Room lights"

- waitForAnimationToEnd

- takeScreenshot:
    path: "screenshots/lights_07_living_room_off"

# ============================================================================
# CONTROL LIGHTS IN OFFICE (if available)
# ============================================================================
- scrollUntilVisible:
    element:
      text: "Office"
    optional: true
    description: "Find Office in the list"

- runFlow:
    when:
      visible:
        text: "Office"
    commands:
      - tapOn:
          text: "Full"
          index: 1
          description: "Set Office lights to full"
      - waitForAnimationToEnd
      - takeScreenshot:
          path: "screenshots/lights_08_office_full"

# ============================================================================
# VERIFY BRIGHTNESS BAR UPDATES
# ============================================================================
# The brightness bar should visually update based on light level
- assertVisible:
    text: "Living Room"

# ============================================================================
# NAVIGATE BACK TO HOME
# ============================================================================
- tapOn:
    id: "back_button"
    optional: true
    description: "Navigate back"

- tapOn:
    contentDescription: "Go back"
    optional: true

- assertVisible:
    text: "Kagami"
    description: "Verify back on home screen"

- takeScreenshot:
    path: "screenshots/lights_09_back_to_home"

# ============================================================================
# VERIFY SAFETY SCORE UNCHANGED
# ============================================================================
# Light operations should not affect safety score (h(x) >= 0)
- assertVisible:
    text: "h(x)"
    description: "Safety score indicator should be visible"

# ============================================================================
# Test completed successfully
# Light controls work as expected across rooms
# ============================================================================
