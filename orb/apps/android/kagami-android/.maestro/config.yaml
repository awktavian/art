# Kagami Android - Maestro Configuration
#
# Global configuration for Maestro E2E tests.
#
# h(x) >= 0. Always.

# Application under test
appId: com.kagami.android

# Default timeout for assertions (milliseconds)
waitTimeout: 10000

# Screenshot configuration
screenshots:
  path: ./screenshots
  format: png
  quality: 80

# Retry configuration
retryCount: 2
retryInterval: 1000

# Test execution order
execution:
  # Run onboarding first (requires fresh install)
  # Then run other flows that assume authenticated state
  order:
    - onboarding_flow.yaml
    - control_lights.yaml
    - scene_activation.yaml

# Environment variables for tests
env:
  KAGAMI_SERVER_URL: "http://kagami.local:8001"
  TEST_MODE: "true"

# Tags for filtering tests
tags:
  critical:
    - onboarding_flow.yaml
    - control_lights.yaml
    - scene_activation.yaml
  smoke:
    - control_lights.yaml
  full:
    - onboarding_flow.yaml
    - control_lights.yaml
    - scene_activation.yaml
