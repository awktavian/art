name: Ralph CLI - CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/cli/kagami-ralph/**'
  pull_request:
    paths:
      - 'apps/cli/kagami-ralph/**'

jobs:
  test:
    name: Build + Test + Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/cli/kagami-ralph/package-lock.json
      
      - name: Install dependencies
        working-directory: apps/cli/kagami-ralph
        run: npm ci
      
      - name: Type check
        working-directory: apps/cli/kagami-ralph
        run: npm run typecheck
      
      - name: Lint
        working-directory: apps/cli/kagami-ralph
        run: npm run lint
      
      - name: Unit tests
        working-directory: apps/cli/kagami-ralph
        run: npm test -- --run
      
      - name: Build
        working-directory: apps/cli/kagami-ralph
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ralph-dist
          path: apps/cli/kagami-ralph/dist
  
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: apps/cli/kagami-ralph
        run: npm ci
      
      - name: Install Playwright
        working-directory: apps/cli/kagami-ralph
        run: npx playwright install --with-deps chromium
      
      - name: Run E2E tests
        working-directory: apps/cli/kagami-ralph
        run: npm run test:e2e
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/cli/kagami-ralph/playwright-report
