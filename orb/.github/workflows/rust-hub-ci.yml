# Kagami Hub (Rust) CI/CD Workflow
#
# Tests the Rust embedded hub crate across multiple platforms:
#   - Linux x86_64 (primary development/server)
#   - Linux ARM64 (Raspberry Pi cross-compilation)
#   - macOS ARM64 (Apple Silicon development)
#
# Test strategy:
#   - Unit tests run on all platforms
#   - Integration tests run on Linux (requires network/mocking)
#   - Cross-compilation tests for Raspberry Pi targets

name: rust-hub-ci

on:
  push:
    branches: [main]
    paths:
      - 'apps/hub/kagami-hub/**'
      - '.github/workflows/rust-hub-ci.yml'
  pull_request:
    paths:
      - 'apps/hub/kagami-hub/**'
      - '.github/workflows/rust-hub-ci.yml'

concurrency:
  group: rust-hub-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # All Linux system dependencies required by Rust hub crate
  LINUX_DEPS: libudev-dev libasound2-dev libspeechd-dev libclang-dev pkg-config

jobs:
  # ============================================================================
  # FAST GATE: Lint and Format Check
  # ============================================================================
  lint:
    name: Rust Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/hub/kagami-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/hub/kagami-hub/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('apps/hub/kagami-hub/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: |
          # Skip piper feature due to upstream API incompatibility with ort
          # Use -W warnings (warn, don't fail) for style lints
          # Focus on correctness, not style
          cargo clippy --all-targets --features audio,persistence,mdns,whisper,tts-fallback -- \
            -W warnings \
            || echo "Clippy completed with warnings (advisory)"
        continue-on-error: true

  # ============================================================================
  # UNIT TESTS (all platforms)
  # ============================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    defaults:
      run:
        working-directory: apps/hub/kagami-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/hub/kagami-hub/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('apps/hub/kagami-hub/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Build (no features)
        run: cargo build --verbose

      - name: Build (with dev features)
        run: cargo build --features dev --verbose

      - name: Run unit tests
        run: cargo test --lib --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose

  # ============================================================================
  # INTEGRATION TESTS (Linux only - requires mocking infrastructure)
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint]
    defaults:
      run:
        working-directory: apps/hub/kagami-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/hub/kagami-hub/target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('apps/hub/kagami-hub/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Build test dependencies
        run: cargo build --tests --verbose

      - name: Run integration tests
        run: cargo test --test '*' --verbose -- --test-threads=2

  # ============================================================================
  # CROSS-COMPILATION TESTS (Raspberry Pi targets)
  # ============================================================================
  cross-compile:
    name: Cross-Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Raspberry Pi 3/4 (64-bit)
          - target: aarch64-unknown-linux-gnu
            cross: true
            features: ""
          # Raspberry Pi 3/4 (64-bit) with hardware features
          - target: aarch64-unknown-linux-gnu
            cross: true
            features: "rpi"
          # Raspberry Pi 2/3 (32-bit)
          - target: armv7-unknown-linux-gnueabihf
            cross: true
            features: ""
    defaults:
      run:
        working-directory: apps/hub/kagami-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/hub/kagami-hub/target
          key: ${{ runner.os }}-cargo-cross-${{ matrix.target }}-${{ hashFiles('apps/hub/kagami-hub/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-${{ matrix.target }}-

      - name: Cross-compile (no features)
        if: matrix.features == ''
        run: cross build --target ${{ matrix.target }} --release

      - name: Cross-compile (with features)
        if: matrix.features != ''
        run: cross build --target ${{ matrix.target }} --features ${{ matrix.features }} --release
        continue-on-error: true  # rpi features may not compile without hardware

      - name: Check binary size
        run: |
          BINARY="target/${{ matrix.target }}/release/kagami-hub"
          if [ -f "$BINARY" ]; then
            SIZE=$(ls -lh "$BINARY" | awk '{print $5}')
            echo "Binary size for ${{ matrix.target }}: $SIZE"
          fi

  # ============================================================================
  # DOCUMENTATION
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    defaults:
      run:
        working-directory: apps/hub/kagami-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/hub/kagami-hub/target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('apps/hub/kagami-hub/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-W warnings"  # Warn, don't fail on warnings
        run: |
          # Skip piper feature due to upstream compatibility issues
          cargo doc --no-deps --features audio,persistence,mdns,whisper,tts-fallback || true

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: rust-docs
          path: apps/hub/kagami-hub/target/doc
          retention-days: 7

  # ============================================================================
  # COVERAGE
  # ============================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    defaults:
      run:
        working-directory: apps/hub/kagami-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.LINUX_DEPS }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/hub/kagami-hub/target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('apps/hub/kagami-hub/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/hub/kagami-hub/lcov.info
          flags: rust-hub
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ============================================================================
  # SECURITY AUDIT
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    defaults:
      run:
        working-directory: apps/hub/kagami-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
        continue-on-error: true  # Advisory, not blocking

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, integration, cross-compile, docs, coverage, security]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Rust Hub CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cross-Compile | ${{ needs.cross-compile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical jobs failed
        if: needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.integration.result == 'failure'
        run: exit 1
