# Kagami Desktop (Tauri) CI/CD Workflow
#
# Tests the Tauri desktop application across platforms:
#   - macOS (Apple Silicon primary)
#   - Linux x86_64
#   - Windows (optional future)
#
# Includes:
#   - Rust backend build and test
#   - TypeScript frontend build
#   - E2E tests with Playwright

name: desktop-ci

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/desktop/kagami-client/**'
      - 'packages/kagami-mesh-sdk/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/desktop/kagami-client/**'
      - 'packages/kagami-mesh-sdk/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # RUST BACKEND LINT & FORMAT
  # ============================================================================
  rust-lint:
    name: Rust Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/desktop/kagami-client/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/kagami-client/src-tauri/target
          key: ${{ runner.os }}-cargo-desktop-lint-${{ hashFiles('apps/desktop/kagami-client/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -W warnings
        continue-on-error: true

  # ============================================================================
  # BUILD & TEST (Multi-platform)
  # ============================================================================
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [rust-lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    defaults:
      run:
        working-directory: apps/desktop/kagami-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/kagami-client/package-lock.json

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/kagami-client/src-tauri/target
          key: ${{ runner.os }}-cargo-desktop-build-${{ hashFiles('apps/desktop/kagami-client/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-build-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Rust backend
        working-directory: apps/desktop/kagami-client/src-tauri
        run: cargo build --release

      - name: Run Rust tests
        working-directory: apps/desktop/kagami-client/src-tauri
        run: cargo test --lib --verbose

      - name: Build TypeScript frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --ci
        continue-on-error: true  # May fail without signing keys

  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/desktop/kagami-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/kagami-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck || true

      - name: Run frontend lint
        run: npm run lint || true

      - name: Run frontend tests
        run: npm test || true

  # ============================================================================
  # SECURITY AUDIT
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/desktop/kagami-client/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
        continue-on-error: true

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [rust-lint, build, frontend-test, security]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Desktop CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Lint | ${{ needs.rust-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical jobs failed
        if: needs.rust-lint.result == 'failure' || needs.build.result == 'failure'
        run: exit 1

