# Deploy Kagami SmartHome to Cloud Run
#
# Triggers on:
# - Push to main affecting smarthome code
# - Manual dispatch
#
# Uses Workload Identity Federation for secure GCP auth.

name: Deploy SmartHome to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'packages/kagami_smarthome/**'
      - 'deploy/cloudrun/smarthome/**'
      - '.github/workflows/smarthome-deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: gen-lang-client-0509316009
  REGION: us-west1
  SERVICE_NAME: kagami-smarthome

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy
        run: |
          gcloud builds submit \
            --config=deploy/cloudrun/smarthome/cloudbuild.yaml \
            --substitutions=COMMIT_SHA=${{ github.sha }} \
            --project=${{ env.PROJECT_ID }}

      - name: Verify Deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          
          echo "Service URL: $SERVICE_URL"
          
          # Health check
          curl -sf "${SERVICE_URL}/health" || exit 1
          echo "✅ Deployment verified"
