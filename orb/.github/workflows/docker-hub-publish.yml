# ═══════════════════════════════════════════════════════════════════════════
# KAGAMI HUB — Docker Hub Publish Workflow
# ═══════════════════════════════════════════════════════════════════════════
#
# Automatically builds and publishes kagami-hub to Docker Hub AFTER CI passes.
#
# Triggers:
#   - After rust-hub-ci workflow succeeds on main branch
#   - After rust-hub-ci workflow succeeds on version tags (v*.*.*)
#   - Manual trigger (workflow_dispatch)
#
# Tags generated:
#   - latest           (latest stable release - main branch)
#   - stable           (alias for latest)
#   - v1.0.0           (specific version from git tag)
#   - v1.0             (minor version)
#   - v1               (major version)
#   - sha-abc1234      (commit SHA)
#   - main             (latest from main branch)
#   - develop          (latest from develop branch)
#
# Required secrets:
#   - DOCKERHUB_USERNAME: Docker Hub username
#   - DOCKERHUB_TOKEN: Docker Hub access token (not password!)
#
# ═══════════════════════════════════════════════════════════════════════════

name: Docker Hub Publish

on:
  # ─────────────────────────────────────────────────────────────────────────
  # Trigger AFTER CI passes (not on push directly)
  # ─────────────────────────────────────────────────────────────────────────
  workflow_run:
    workflows: ["rust-hub-ci"]
    types: [completed]
    branches: [main, develop]

  # ─────────────────────────────────────────────────────────────────────────
  # Also trigger on version tags (after tag push)
  # ─────────────────────────────────────────────────────────────────────────
  push:
    tags:
      - 'v*.*.*'

  # ─────────────────────────────────────────────────────────────────────────
  # Manual trigger for emergencies or testing
  # ─────────────────────────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty for auto)'
        required: false
        default: ''
      skip_ci_check:
        description: 'Skip CI check (emergency only)'
        type: boolean
        required: false
        default: false
      push_to_registry:
        description: 'Push to Docker Hub'
        type: boolean
        required: false
        default: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: kagami/kagami-hub

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # GATE: Verify CI passed (unless skipped for emergency)
  # ─────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate Check
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      trigger_ref: ${{ steps.check.outputs.trigger_ref }}
      trigger_sha: ${{ steps.check.outputs.trigger_sha }}
    steps:
      - name: Check CI status
        id: check
        run: |
          # Determine the trigger source and ref
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Triggered by workflow_run - check if CI succeeded
            CI_CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            TRIGGER_REF="${{ github.event.workflow_run.head_branch }}"
            TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"

            echo "📋 Triggered by workflow_run"
            echo "   CI Conclusion: $CI_CONCLUSION"
            echo "   Branch: $TRIGGER_REF"
            echo "   SHA: ${TRIGGER_SHA:0:7}"

            if [ "$CI_CONCLUSION" = "success" ]; then
              echo "✅ CI passed - proceeding with deployment"
              echo "should_deploy=true" >> $GITHUB_OUTPUT
            else
              echo "❌ CI did not succeed (conclusion: $CI_CONCLUSION) - skipping deployment"
              echo "should_deploy=false" >> $GITHUB_OUTPUT
            fi

          elif [ "${{ github.event_name }}" = "push" ]; then
            # Tag push - we need to verify CI passed for this commit
            TRIGGER_REF="${{ github.ref_name }}"
            TRIGGER_SHA="${{ github.sha }}"

            echo "📋 Triggered by tag push: $TRIGGER_REF"
            echo "   SHA: ${TRIGGER_SHA:0:7}"

            # For tags, we trust they were created from a passing CI commit
            # The branch protection rules should enforce this
            echo "✅ Tag push - proceeding (branch protection should enforce CI)"
            echo "should_deploy=true" >> $GITHUB_OUTPUT

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGER_REF="${{ github.ref_name }}"
            TRIGGER_SHA="${{ github.sha }}"

            echo "📋 Triggered by manual dispatch"

            if [ "${{ inputs.skip_ci_check }}" = "true" ]; then
              echo "⚠️  CI check skipped (emergency mode)"
              echo "should_deploy=true" >> $GITHUB_OUTPUT
            else
              echo "✅ Manual trigger - proceeding"
              echo "should_deploy=true" >> $GITHUB_OUTPUT
            fi
          fi

          echo "trigger_ref=${TRIGGER_REF}" >> $GITHUB_OUTPUT
          echo "trigger_sha=${TRIGGER_SHA}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────
  # BUILD: Multi-arch Docker build
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: needs.ci-gate.outputs.should_deploy == 'true'

    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # Checkout at the correct SHA
      # ─────────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci-gate.outputs.trigger_sha }}

      # ─────────────────────────────────────────────────────────────────────
      # Read Version
      # ─────────────────────────────────────────────────────────────────────
      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat apps/hub/kagami-hub/VERSION | tr -d '[:space:]')

          # Override if provided via workflow_dispatch
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "📦 Version override: $VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      # ─────────────────────────────────────────────────────────────────────
      # Set up QEMU for multi-arch builds
      # ─────────────────────────────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ─────────────────────────────────────────────────────────────────────
      # Set up Docker Buildx
      # ─────────────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # ─────────────────────────────────────────────────────────────────────
      # Login to Docker Hub
      # ─────────────────────────────────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─────────────────────────────────────────────────────────────────────
      # Extract metadata for tags
      # ─────────────────────────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch tags
            type=ref,event=branch,value=${{ needs.ci-gate.outputs.trigger_ref }}
            # Tag as 'latest' and 'stable' on main
            type=raw,value=latest,enable=${{ needs.ci-gate.outputs.trigger_ref == 'main' }}
            type=raw,value=stable,enable=${{ needs.ci-gate.outputs.trigger_ref == 'main' }}
            # Semver tags from git tags
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            # SHA tag
            type=sha,prefix=sha-
            # Version from VERSION file
            type=raw,value=v${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=Kagami Hub
            org.opencontainers.image.description=Voice-first smart home hub for Raspberry Pi
            org.opencontainers.image.vendor=Kagami
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      # ─────────────────────────────────────────────────────────────────────
      # Build and Push
      # ─────────────────────────────────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: apps/hub/kagami-hub
          file: apps/hub/kagami-hub/Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push_to_registry != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ needs.ci-gate.outputs.trigger_sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ─────────────────────────────────────────────────────────────────────
      # Verify the image
      # ─────────────────────────────────────────────────────────────────────
      - name: Verify image
        if: github.event.inputs.push_to_registry != 'false'
        run: |
          echo "🔍 Verifying published image..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} || \
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}
          echo "✅ Image verification successful"

      # ─────────────────────────────────────────────────────────────────────
      # Summary
      # ─────────────────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`linux/amd64, linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Commands" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Latest stable" >> $GITHUB_STEP_SUMMARY
          echo "docker pull kagami/kagami-hub:stable" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Specific version" >> $GITHUB_STEP_SUMMARY
          echo "docker pull kagami/kagami-hub:v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# This exact build" >> $GITHUB_STEP_SUMMARY
          echo "docker pull kagami/kagami-hub@${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # SECURITY: Scan the built image
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [ci-gate, build]
    if: needs.ci-gate.outputs.should_deploy == 'true'
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.build.outputs.version }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Update Docker Hub Description
  # ─────────────────────────────────────────────────────────────────────────
  update-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    needs: [ci-gate, build]
    if: needs.ci-gate.outputs.trigger_ref == 'main' && needs.ci-gate.outputs.should_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci-gate.outputs.trigger_sha }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: apps/hub/kagami-hub/README.md
          short-description: "🎤 Voice-first smart home hub for Raspberry Pi"

  # ─────────────────────────────────────────────────────────────────────────
  # Notify on failure
  # ─────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [ci-gate, build]
    if: failure()
    steps:
      - name: Create failure summary
        run: |
          echo "## ❌ Docker Hub Publish Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Docker image failed to build or publish." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** ${{ needs.ci-gate.outputs.trigger_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** ${{ needs.ci-gate.outputs.trigger_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
