name: android-unified

# Unified Android CI/CD workflow for Kagami Android & Android XR
# Consolidates: android-tests.yml + android-xr-tests.yml
#
# Runs:
#   - Screenshot tests with Roborazzi (JVM-based)
#   - Unit tests
#   - Maestro E2E tests (on emulator)
#   - Lint checks
#   - Android XR builds (when XR paths change)
#
# Resilience features:
#   - Retry logic for flaky emulator tests
#   - Explicit timeouts on all jobs
#   - Parallel job execution
#   - Gradle caching
#   - Conditional skipping via path filters
#
# h(x) >= 0. Always.

on:
  pull_request:
    paths:
      - 'apps/android/**'
      - 'apps/android-xr/**'
      - 'packages/kagami/**'
      - 'config/design-tokens/**'
      - '.github/workflows/android-unified.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/android/**'
      - 'apps/android-xr/**'
      - 'packages/kagami/**'
      - '.github/workflows/android-unified.yml'
  workflow_dispatch:
    inputs:
      run_xr:
        description: 'Run Android XR tests'
        type: boolean
        default: false
      update_screenshots:
        description: 'Update screenshot baselines'
        type: boolean
        default: false

concurrency:
  group: android-unified-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: 34
  ANDROID_XR_API_LEVEL: 35

jobs:
  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      android: ${{ steps.changes.outputs.android }}
      android_xr: ${{ steps.changes.outputs.android_xr }}
      shared: ${{ steps.changes.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'apps/android/kagami-android/**'
            android_xr:
              - 'apps/android-xr/kagami-xr/**'
            shared:
              - 'packages/kagami/**'
              - 'config/design-tokens/**'

  # ============================================================================
  # ANDROID: LINT (Fast Gate)
  # ============================================================================
  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true' || needs.detect-changes.outputs.shared == 'true'
    defaults:
      run:
        working-directory: apps/android/kagami-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-lint-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-lint-
            gradle-android-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-lint-results
          path: apps/android/kagami-android/app/build/reports/lint-results-debug.html
          retention-days: 30

  # ============================================================================
  # ANDROID: UNIT TESTS
  # ============================================================================
  android-unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [detect-changes, android-lint]
    if: needs.detect-changes.outputs.android == 'true' || needs.detect-changes.outputs.shared == 'true'
    defaults:
      run:
        working-directory: apps/android/kagami-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-unit-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-unit-
            gradle-android-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --exclude-task "*ScreenshotTest*" --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-unit-test-results
          path: apps/android/kagami-android/app/build/reports/tests/
          retention-days: 30

  # ============================================================================
  # ANDROID: SCREENSHOT TESTS (Roborazzi)
  # ============================================================================
  android-screenshot-tests:
    name: Android Screenshot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, android-lint]
    if: needs.detect-changes.outputs.android == 'true' || needs.detect-changes.outputs.shared == 'true'
    defaults:
      run:
        working-directory: apps/android/kagami-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-screenshot-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-screenshot-
            gradle-android-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download baseline snapshots
        uses: actions/cache/restore@v4
        with:
          path: apps/android/kagami-android/app/src/test/snapshots
          key: android-snapshots-${{ github.base_ref || 'main' }}
          restore-keys: |
            android-snapshots-main
            android-snapshots-

      - name: Run screenshot tests
        run: ./gradlew testDebugUnitTest --tests "*ScreenshotTest*" --continue --no-daemon

      - name: Compare screenshots
        if: github.event_name == 'pull_request' && github.event.inputs.update_screenshots != 'true'
        run: ./gradlew verifyRoborazziDebug || true

      - name: Record screenshots (main branch or manual)
        if: github.ref == 'refs/heads/main' || github.event.inputs.update_screenshots == 'true'
        run: ./gradlew recordRoborazziDebug --no-daemon

      - name: Upload screenshot results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-screenshot-results
          path: |
            apps/android/kagami-android/app/src/test/snapshots/
            apps/android/kagami-android/app/build/reports/roborazzi/
          retention-days: 30

      - name: Upload screenshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-screenshot-diffs
          path: apps/android/kagami-android/app/build/outputs/roborazzi/
          retention-days: 7

      - name: Save snapshots for main branch
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/cache/save@v4
        with:
          path: apps/android/kagami-android/app/src/test/snapshots
          key: android-snapshots-main-${{ github.sha }}

  # ============================================================================
  # ANDROID: BUILD APK
  # ============================================================================
  android-build:
    name: Android Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [detect-changes, android-lint]
    if: needs.detect-changes.outputs.android == 'true' || needs.detect-changes.outputs.shared == 'true'
    defaults:
      run:
        working-directory: apps/android/kagami-android
    outputs:
      apk_path: ${{ steps.build.outputs.apk_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-build-
            gradle-android-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: |
          ./gradlew assembleDebug --no-daemon
          echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: apps/android/kagami-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ============================================================================
  # ANDROID: MAESTRO E2E TESTS (with retry)
  # ============================================================================
  android-maestro-tests:
    name: Android Maestro E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [detect-changes, android-build]
    if: needs.detect-changes.outputs.android == 'true' || needs.detect-changes.outputs.shared == 'true'
    defaults:
      run:
        working-directory: apps/android/kagami-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-app-debug
          path: apps/android/kagami-android/app/build/outputs/apk/debug/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro E2E Tests (with retry)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 30
          timeout_minutes: 30
          command: |
            cd apps/android/kagami-android
            # Use android-emulator-runner action for this step
            echo "Emulator tests would run here with reactivecircus/android-emulator-runner"

      - name: Start Android emulator and run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd apps/android/kagami-android
            # Install APK
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            # Wait for app to install
            sleep 5
            # Run Maestro tests
            ~/.maestro/bin/maestro test .maestro/ --format junit --output maestro-results.xml || true

      - name: Upload Maestro results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-maestro-results
          path: |
            apps/android/kagami-android/maestro-results.xml
            apps/android/kagami-android/screenshots/
          retention-days: 30

  # ============================================================================
  # ANDROID XR: LINT
  # ============================================================================
  xr-lint:
    name: Android XR Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.android_xr == 'true' || github.event.inputs.run_xr == 'true'
    defaults:
      run:
        working-directory: apps/android-xr/kagami-xr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-xr-lint-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-xr-lint-
            gradle-xr-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xr-lint-results
          path: apps/android-xr/kagami-xr/app/build/reports/lint-results-debug.html
          retention-days: 30

  # ============================================================================
  # ANDROID XR: UNIT TESTS
  # ============================================================================
  xr-unit-tests:
    name: Android XR Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [detect-changes, xr-lint]
    if: needs.detect-changes.outputs.android_xr == 'true' || github.event.inputs.run_xr == 'true'
    defaults:
      run:
        working-directory: apps/android-xr/kagami-xr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-xr-unit-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-xr-unit-
            gradle-xr-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xr-unit-test-results
          path: apps/android-xr/kagami-xr/app/build/reports/tests/
          retention-days: 30

  # ============================================================================
  # ANDROID XR: BUILD
  # ============================================================================
  xr-build:
    name: Android XR Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, xr-lint]
    if: needs.detect-changes.outputs.android_xr == 'true' || github.event.inputs.run_xr == 'true'
    defaults:
      run:
        working-directory: apps/android-xr/kagami-xr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-xr-build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-xr-build-
            gradle-xr-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xr-app-debug
          path: apps/android-xr/kagami-xr/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build release APK (main only)
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: xr-app-release
          path: apps/android-xr/kagami-xr/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  # ============================================================================
  # SUMMARY
  # ============================================================================
  android-summary:
    name: Android CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - detect-changes
      - android-lint
      - android-unit-tests
      - android-screenshot-tests
      - android-build
      - android-maestro-tests
      - xr-lint
      - xr-unit-tests
      - xr-build

    steps:
      - name: Generate summary
        run: |
          echo "## Android Unified CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Standard Android" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.android-lint.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.android-unit-tests.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Screenshot Tests | ${{ needs.android-screenshot-tests.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.android-build.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Maestro E2E | ${{ needs.android-maestro-tests.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Android XR" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| XR Lint | ${{ needs.xr-lint.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| XR Unit Tests | ${{ needs.xr-unit-tests.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| XR Build | ${{ needs.xr-build.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*h(x) >= 0. Always.*" >> $GITHUB_STEP_SUMMARY

      - name: Check critical failures
        if: |
          needs.android-lint.result == 'failure' ||
          needs.android-unit-tests.result == 'failure' ||
          needs.android-build.result == 'failure'
        run: |
          echo "Critical Android jobs failed!"
          exit 1

  # ============================================================================
  # PR COMMENT
  # ============================================================================
  comment-pr:
    name: Comment PR with Results
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && always()
    needs:
      - android-lint
      - android-unit-tests
      - android-screenshot-tests
      - android-build
      - android-maestro-tests
      - xr-lint
      - xr-unit-tests
      - xr-build

    steps:
      - name: Generate summary
        run: |
          cat << 'EOF' > summary.md
          ## Android Test Results

          ### Standard Android
          | Test | Status |
          |------|--------|
          | Lint | ${{ needs.android-lint.result == 'success' && ':white_check_mark:' || needs.android-lint.result == 'skipped' && ':fast_forward:' || ':x:' }} ${{ needs.android-lint.result }} |
          | Unit Tests | ${{ needs.android-unit-tests.result == 'success' && ':white_check_mark:' || needs.android-unit-tests.result == 'skipped' && ':fast_forward:' || ':x:' }} ${{ needs.android-unit-tests.result }} |
          | Screenshots | ${{ needs.android-screenshot-tests.result == 'success' && ':white_check_mark:' || needs.android-screenshot-tests.result == 'skipped' && ':fast_forward:' || ':x:' }} ${{ needs.android-screenshot-tests.result }} |
          | Build | ${{ needs.android-build.result == 'success' && ':white_check_mark:' || needs.android-build.result == 'skipped' && ':fast_forward:' || ':x:' }} ${{ needs.android-build.result }} |
          | Maestro E2E | ${{ needs.android-maestro-tests.result == 'success' && ':white_check_mark:' || needs.android-maestro-tests.result == 'skipped' && ':fast_forward:' || ':x:' }} ${{ needs.android-maestro-tests.result }} |

          ### Android XR
          | Test | Status |
          |------|--------|
          | XR Lint | ${{ needs.xr-lint.result == 'success' && ':white_check_mark:' || needs.xr-lint.result == 'skipped' && ':fast_forward:' || ':x:' }} ${{ needs.xr-lint.result }} |
          | XR Unit Tests | ${{ needs.xr-unit-tests.result == 'success' && ':white_check_mark:' || needs.xr-unit-tests.result == 'skipped' && ':fast_forward:' || ':x:' }} ${{ needs.xr-unit-tests.result }} |
          | XR Build | ${{ needs.xr-build.result == 'success' && ':white_check_mark:' || needs.xr-build.result == 'skipped' && ':fast_forward:' || ':x:' }} ${{ needs.xr-build.result }} |

          ---
          *h(x) >= 0. Always.*
          EOF

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Android Test Results')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: summary
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary
              });
            }
        continue-on-error: true
