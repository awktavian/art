# LiveKit Ingress Configuration
# Accepts RTMP/WHIP input for livestreaming into rooms

# Connect to LiveKit server
api_key: devkey
api_secret: devsecret1234567890abcdefghijklmnop
ws_url: ws://livekit:7880

# Redis for coordination
redis:
  address: redis:6379

# HTTP service port (WHIP endpoint)
http_relay_port: 8080

# RTMP settings
rtmp_port: 1935

# Logging
log_level: info

# Health check
health_port: 8082
