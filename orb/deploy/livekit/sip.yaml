# LiveKit SIP Bridge Configuration
# Connects phone calls (PSTN) to LiveKit rooms

# Connect to LiveKit server
api_key: devkey
api_secret: devsecret1234567890abcdefghijklmnop
ws_url: ws://livekit:7880

# SIP settings
sip:
  # SIP signaling port
  port: 5060
  # SIP transport
  transport: udp

  # Trunk configuration
  # For local testing, use a SIP provider like:
  # - Twilio Elastic SIP Trunking
  # - Telnyx
  # - SignalWire
  # - VoIP.ms
  trunks: []

  # Dispatch rules: route incoming calls to rooms
  # dispatch_rules:
  #   - rule_type: direct
  #     room_name: answering-machine
  #     pin_required: false

# Logging
log_level: info

# Health check
health_port: 8083
