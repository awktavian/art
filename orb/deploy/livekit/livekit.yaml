# LiveKit Server Configuration
# https://docs.livekit.io/deploy/configuration

port: 7880
rtc:
  # Port range for WebRTC media
  port_range_start: 50000
  port_range_end: 60000
  # Use TCP fallback when UDP blocked
  tcp_port: 7881
  # STUN/TURN
  stun_servers:
    - stun:stun.l.google.com:19302
  use_ice_lite: true

# Development mode settings
development: true
log_level: info

# API keys (override via environment)
keys:
  devkey: devsecret1234567890abcdefghijklmnop

# Redis for distributed state (optional)
redis:
  address: redis:6379

# Room settings
room:
  # Max 10 participants per room
  max_participants: 10
  # Auto-create rooms
  auto_create: true
  # Room timeout (empty room cleanup)
  empty_timeout: 300

# Webhooks (for Kagami integration)
webhook:
  urls:
    - http://host.docker.internal:8000/api/livekit/webhook
  api_key: devkey

# Region settings
region: local

# Turn settings for NAT traversal
turn:
  enabled: true
  domain: localhost
  # External IP for TURN (replace with your IP)
  # external_tls: true
  udp_port: 7882
  tcp_port: 7881

# Codec preferences
codecs:
  video:
    - VP9
    - VP8
    - H264
  audio:
    - opus
    - red

# Limits
limit:
  num_tracks: 50
  bytes_per_sec: 10485760  # 10 MB/s

# Recording/egress config reference
# (actual config in egress service)
