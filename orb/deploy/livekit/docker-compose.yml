# LiveKit Local Server — Self-hosted real-time voice/video
#
# Usage:
#   cd deploy/livekit && docker-compose up -d
#
# Access:
#   - WebSocket: ws://localhost:7880
#   - HTTP API: http://localhost:7880
#   - SIP: sip://localhost:5060
#   - TURN/ICE: udp/tcp 3478, 50000-60000
#
# Environment:
#   Export these or create a .env file:
#   - LIVEKIT_API_KEY=devkey
#   - LIVEKIT_API_SECRET=secret (32+ chars for production)
#
# See: https://docs.livekit.io/deploy/self-hosted

version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: kagami-livekit
    restart: unless-stopped
    command: --dev --config /etc/livekit.yaml
    ports:
      # Main WebSocket/HTTP
      - "7880:7880"
      # TURN/ICE (WebRTC connectivity)
      - "7881:7881"
      - "7882:7882/udp"
      # UDP port range for media
      - "50000-60000:50000-60000/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret1234567890abcdefghijklmnop}
    networks:
      - kagami-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for LiveKit state (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: kagami-livekit-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - livekit-redis-data:/data
    networks:
      - kagami-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Egress service for recording/streaming to OBS
  egress:
    image: livekit/egress:latest
    container_name: kagami-livekit-egress
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - livekit-recordings:/recordings
    networks:
      - kagami-network
    depends_on:
      - livekit
      - redis

  # Ingress service for RTMP/WHIP ingest
  ingress:
    image: livekit/ingress:latest
    container_name: kagami-livekit-ingress
    restart: unless-stopped
    ports:
      # RTMP ingest (from OBS)
      - "1935:1935"
      # WHIP endpoint
      - "8080:8080"
    environment:
      - INGRESS_CONFIG_FILE=/etc/ingress.yaml
    volumes:
      - ./ingress.yaml:/etc/ingress.yaml:ro
    networks:
      - kagami-network
    depends_on:
      - livekit
      - redis

  # SIP bridge for phone integration
  sip:
    image: livekit/sip:latest
    container_name: kagami-livekit-sip
    restart: unless-stopped
    ports:
      # SIP signaling
      - "5060:5060/udp"
      - "5060:5060/tcp"
    environment:
      - SIP_CONFIG_FILE=/etc/sip.yaml
    volumes:
      - ./sip.yaml:/etc/sip.yaml:ro
    networks:
      - kagami-network
    depends_on:
      - livekit

networks:
  kagami-network:
    driver: bridge

volumes:
  livekit-redis-data:
  livekit-recordings:
