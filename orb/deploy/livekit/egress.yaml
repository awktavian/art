# LiveKit Egress Configuration
# Records and streams to RTMP (OBS, YouTube, Twitch)

# Connect to LiveKit server
api_key: devkey
api_secret: devsecret1234567890abcdefghijklmnop
ws_url: ws://livekit:7880

# Redis for job coordination
redis:
  address: redis:6379

# Health check port
health_port: 8081

# CPU settings
cpu_cost:
  # Max CPU cores for processing
  room_composite_cpu_cost: 3.0
  track_composite_cpu_cost: 2.0
  track_cpu_cost: 1.0

# Logging
log_level: info

# File output settings
file_output:
  # Local storage path
  local: /recordings
  # S3 settings (optional)
  # s3:
  #   access_key: YOUR_ACCESS_KEY
  #   secret: YOUR_SECRET
  #   region: us-west-2
  #   bucket: kagami-recordings

# Template settings for compositing
template_base: https://recorder.livekit.io

# RTMP output settings (for OBS)
stream_output:
  rtmp:
    # Default OBS RTMP URL
    # Override per-request for custom destinations
    urls: []
